<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Emigrantbook Games</title>
    <link rel="stylesheet" href="style.css"> <!-- შენი მთავარი CSS -->


<style>
    /* თამაშების მთავარი გვერდის სტილი */
    #gamesPage {
        padding: 20px;
        max-width: 800px;
        margin: 0 auto;
        font-family: Arial, sans-serif;
    }

    #gameBalance {
        font-size: 24px;
        font-weight: bold;
        color: #d4af37; /* ოქროსფერი */
        margin: 20px 0;
        text-align: center;
    }

    .games-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 15px;
        margin-top: 20px;
    }

    .games-grid button {
        background: #1a1a1a;
        color: #d4af37;
        border: 1px solid #d4af37;
        padding: 15px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
    }

    .games-grid button:hover {
        background: #d4af37;
        color: #000;
    }

    /* უკან დაბრუნების ლინკი */
    #gamesPage > a {
        color: #888;
        text-decoration: none;
        font-size: 16px;
    }

    /* დამატებითი თამაშების კონტეინერების დამალვა/გამოჩენა */
    .game-container {
        border: 1px solid #333;
        padding: 20px;
        border-radius: 10px;
        background: #0a0a0a;
        margin-top: 20px;
    }
</style>
</head>



    
<body style="background: #000; color: #fff;">

    <!-- თამაშების კონტეინერი -->
    <div id="gamesPage">
        <a href="index.html">← მთავარზე დაბრუნება</a>
        <div id="gameBalance">0.00 AKHO</div>

        <!-- აქ ჩაყარე ის თამაშების კონტეინერები, რაც ადრე მოგეცი -->
        <div id="gamesList">...</div>
    </div>

    <script src="script.js"></script> <!-- შენი მთავარი JS -->
</body>
</html>
