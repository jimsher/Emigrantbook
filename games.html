<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emigrantbook Games</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 10px; }
        #gamesPage { width: 100%; max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
        #gameBalance { font-size: 20px; color: #d4af37; text-align: center; margin: 15px 0; font-weight: bold; }
        .games-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .games-grid button { background: #1a1a1a; color: #d4af37; border: 1px solid #d4af37; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .game-container { display: none; border: 1px solid #333; padding: 15px; border-radius: 10px; background: #0a0a0a; margin-top: 10px; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box; }
        .reel { width: 70px; height: 70px; border: 1px solid #d4af37; display: flex; align-items: center; justify-content: center; font-size: 40px; background: #222; }
        .num-btn { width: 40px; height: 40px; border: 1px solid #444; background: #222; cursor: pointer; color: white; display: flex; align-items: center; justify-content: center; }
        .num-btn.selected { background: #d4af37; color: #000; }
        .lotto-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
        .lotto-ball { width: 30px; height: 30px; background: #d4af37; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; }
        .king-cell { width: 40px; height: 40px; background: #1a1a1a; border: 1px solid #333; display: flex; align-items: center; justify-content: center; }
        .king-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="gamesPage">
        <div id="gameBalance">0.00 AKHO</div>
        <div id="gamesList" class="games-grid">
            <button onclick="playGame('spin')">Lucky Spin</button>
            <button onclick="openLotto()">Lotto 5/25</button>
            <button onclick="openBurningSlots()">Burning Slots</button>
            <button onclick="openKingOfAkho()">King of Akho</button>
        </div>

        <div id="wheelGameContainer" class="game-container">
            <canvas id="wheelCanvas" width="280" height="280"></canvas>
            <button id="spinBtn" onclick="spinWheel()">დატრიალება (1.00 AKHO)</button>
            <button onclick="backToGamesList()">უკან</button>
        </div>

        <div id="lottoGameContainer" class="game-container">
            <div id="lottoGrid" class="lotto-grid"></div>
            <div id="lottoBalls" style="display:flex; gap:5px;"></div>
            <button id="playLottoBtn" onclick="startLottoDraw()">დაწყება (5.00 AKHO)</button>
            <button onclick="backToGamesList()">უკან</button>
        </div>

        <div id="burningSlotsContainer" class="game-container">
            <div id="reelsWrapper" style="display:flex; gap:5px;">
                <div id="reel_1" class="reel"></div>
                <div id="reel_2" class="reel"></div>
                <div id="reel_3" class="reel"></div>
            </div>
            <button onclick="triggerBurningSpin()">Spin</button>
            <button onclick="backFromSlots()">უკან</button>
        </div>
        
        <div id="kingOfAkhoContainer" class="game-container">
            <div id="kingMultiplier">Multiplier: x1</div>
            <div id="kingGrid" class="king-grid"></div>
            <button onclick="startKingSpin()">Start King Spin</button>
            <button onclick="backToGamesListFromKing()">უკან</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyDA1MD_juyLU26Nytxn7kzEcBkpVhS3rbk", authDomain: "emigrantbook.firebaseapp.com", databaseURL: "https://emigrantbook-default-rtdb.europe-west1.firebasedatabase.app", projectId: "emigrantbook", storageBucket: "emigrantbook.firebasestorage.app", appId: "1:138873748174:web:2d4422cdd62cd7e594ee9f" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        /* --- აქ არის შენი მოწოდებული სრული ლოგიკა --- */
        
        function updateGameBalance() {
            const user = auth.currentUser;
            if (user) {
                db.ref(`users/${user.uid}/akho`).on('value', snap => {
                    const bal = snap.val() || 0;
                    const balElem = document.getElementById('gameBalance');
                    if(balElem) balElem.innerText = bal.toFixed(2) + " AKHO";
                });
            }
        }

        const prizes = [0.5, 2, 0, 5, 1, 0.5, 10, 0];
        const colors = ["#1a1a1a", "#d4af37", "#1a1a1a", "#d4af37", "#1a1a1a", "#d4af37", "#ff4d4d", "#1a1a1a"];
        let currentRotation = 0;
        let isSpinning = false;

        function backToGamesList() {
            document.querySelectorAll('.game-container').forEach(c => c.style.display = 'none');
            document.getElementById('gamesList').style.display = 'grid';
        }

        function playGame(type) {
            if(type === 'spin') {
                document.getElementById('gamesList').style.display = 'none';
                document.getElementById('wheelGameContainer').style.display = 'flex';
                drawWheel();
            }
        }

        function drawWheel() {
            const canvas = document.getElementById('wheelCanvas');
            const ctx = canvas.getContext('2d');
            const center = 140;
            const sliceAngle = (2 * Math.PI) / prizes.length;
            ctx.clearRect(0, 0, 280, 280);
            prizes.forEach((prize, i) => {
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(center, center);
                ctx.arc(center, center, center, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.fill();
            });
        }

        function spinWheel() {
            if(isSpinning) return;
            isSpinning = true;
            const canvas = document.getElementById('wheelCanvas');
            const extraDegrees = Math.floor(Math.random() * 360) + 2160;
            currentRotation += extraDegrees;
            canvas.style.transition = "transform 4s ease-out";
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            setTimeout(() => { isSpinning = false; alert("თამაში დასრულდა!"); }, 4000);
        }

        function openLotto() {
            document.getElementById('gamesList').style.display = 'none';
            document.getElementById('lottoGameContainer').style.display = 'flex';
            const grid = document.getElementById('lottoGrid');
            grid.innerHTML = "";
            for(let i=1; i<=25; i++) {
                const btn = document.createElement('button');
                btn.className = 'num-btn';
                btn.innerText = i;
                btn.onclick = () => btn.classList.toggle('selected');
                grid.appendChild(btn);
            }
        }

        async function startLottoDraw() {
            const btn = document.getElementById('playLottoBtn');
            btn.disabled = true;
            alert("გათამაშება დაწყებულია...");
            await new Promise(r => setTimeout(r, 2000));
            alert("გათამაშება დასრულდა!");
            btn.disabled = false;
        }

        function backFromSlots() {
            document.getElementById('burningSlotsContainer').style.display = 'none';
            document.getElementById('gamesList').style.display = 'grid';
        }
        
        function openBurningSlots() {
            document.getElementById('gamesList').style.display = 'none';
            document.getElementById('burningSlotsContainer').style.display = 'flex';
        }

        function openKingOfAkho() {
            document.getElementById('gamesList').style.display = 'none';
            document.getElementById('kingOfAkhoContainer').style.display = 'flex';
        }
        
        function backToGamesListFromKing() {
            document.getElementById('kingOfAkhoContainer').style.display = 'none';
            document.getElementById('gamesList').style.display = 'grid';
        }

        function triggerBurningSpin() { alert("სლოტები ტრიალებს!"); }
        function startKingSpin() { alert("King of Akho დაწყებულია!"); }

        auth.onAuthStateChanged(user => { if(user) updateGameBalance(); });
    </script>
</body>
</html>
