<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emigrantbook Games</title>
    <style>
        :root { --gold: #d4af37; }
        body { margin: 0; background: #0f0f0f; color: #fff; font-family: Arial, sans-serif; }
        
        /* მთავარი კონტეინერი */
        #gamesPage { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #0f0f0f; 
            z-index: 400000; 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; 
            padding-bottom: 80px; 
        }
        
        .game-card { 
            background: #1a1a1a; 
            padding: 15px; 
            border-radius: 15px; 
            cursor: pointer; 
            border: 1px solid #333; 
            text-align: center; 
            transition: transform 0.2s;
        }
        .game-card:active { transform: scale(0.95); }
        
        .game-container { 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            gap: 20px; 
        }
        
        /* 🎰 სლოტების CSS კონფიგურაცია ფიზიკური ტრიალისთვის */
        .slot-window {
            background: linear-gradient(145deg, #222, #000); 
            padding: 20px; 
            border-radius: 20px; 
            border: 4px solid #444;
        }
        .reels-wrapper-flex {
            display: flex; 
            gap: 10px; 
            background: #111; 
            padding: 10px; 
            border-radius: 10px;
            overflow: hidden; /* აუცილებელია რომ ზედმეტი ხილი დაიმალოს */
            height: 70px; /* ერთი სიმბოლოს სიმაღლე */
        }
        .reel { 
            width: 70px; 
            height: 70px; 
            background: #1a1a1a; 
            border: 1px solid #444; 
            display: flex; 
            flex-direction: column;
            text-align: center;
        }
        .reel-cell {
            height: 70px;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
        }
        
        /* ლოტო და სხვა ელემენტები */
        .num-btn { padding: 10px; border: 1px solid #444; background: #222; cursor: pointer; color: white; border-radius: 5px; }
        .num-btn.selected { background: var(--gold); color: #000; font-weight: bold; }
        .lotto-ball { width: 40px; height: 40px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; font-size: 16px; box-shadow: 0 0 10px var(--gold); }
        .empty-slot { width: 40px; height: 40px; border-radius: 50%; background: #222; border: 1px dashed #444; display: flex; align-items: center; justify-content: center; color: #444; }
        .king-cell { width: 50px; height: 50px; background: #1a1a1a; border: 1px solid #333; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 28px; }
        .bet-btn { color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="gamesPage">
    <div style="padding:20px; display:flex; align-items:center; justify-content:space-between; background:#1a1a1a; border-bottom:1px solid #333;">
        <h2 style="color:var(--gold); margin:0; font-size:20px;">Premium თამაშები</h2>
        <span onclick="closeGamesPage()" style="color:white; font-size:25px; cursor:pointer;">✕</span>
    </div>

    <div style="margin:15px; padding:15px; background:linear-gradient(90deg, #2c3e50, #000); border-radius:15px; border:1px solid var(--gold); display:flex; justify-content:space-between; align-items:center;">
        <span style="color:white;">შენი ბალანსი:</span>
        <span id="gameBalance" style="color:var(--gold); font-weight:bold; font-size:18px;">0.00 AKHO</span>
    </div>

    <div id="gamesList" style="padding:15px; display:grid; grid-template-columns:1fr 1fr; gap:15px;">
        <div class="game-card" onclick="playGame('spin')">
            <div style="height:80px; background:url('https://cdn-icons-png.flaticon.com/512/2361/2361730.png') center/contain no-repeat; margin-bottom:10px;"></div>
            <div style="color:white; font-weight:bold;">იღბლიანი ბორბალი</div>
            <div style="color:var(--gold); font-size:12px;">1.00 AKHO</div>
        </div>

        <div class="game-card" onclick="openLotto()">
            <div style="height:80px; background:url('https://cdn-icons-png.flaticon.com/512/263/263060.png') center/contain no-repeat; margin-bottom:10px;"></div>
            <div style="color:white; font-weight:bold;">ციფრული ლოტო</div>
            <div style="color:var(--gold); font-size:12px;">5.00 AKHO</div>
        </div>
        
        <div class="game-card" onclick="openBurningSlots()">
            <div style="height:80px; background:url('https://cdn-icons-png.flaticon.com/512/1055/1055823.png') center/contain no-repeat; margin-bottom:10px;"></div>
            <div style="color:white; font-weight:bold;">Burning Slots</div>
            <div style="color:var(--gold); font-size:12px;">0.20 AKHO</div>
        </div>
        
        <div class="game-card" onclick="openKingOfAkho()">
            <div style="height:80px; background:url('https://cdn-icons-png.flaticon.com/512/8201/8201944.png') center/contain no-repeat; margin-bottom:10px;"></div>
            <div style="color:var(--gold); font-weight:bold;">King of Akho</div>
            <div style="color:white; font-size:12px;">10.00 AKHO</div>
        </div>
    </div>

    <div id="wheelGameContainer" class="game-container">
        <div style="position:relative; width:280px; height:280px;">
            <div style="position:absolute; top:-15px; left:50%; transform:translateX(-50%); z-index:10; color:#ff4d4d; font-size:35px;">▼</div>
            <canvas id="wheelCanvas" width="280" height="280" style="border-radius:50%; border: 8px solid #1a1a1a;"></canvas>
        </div>
        <button id="spinBtn" onclick="spinWheel()" style="background:linear-gradient(180deg, #d4af37, #b8860b); color:black; border:none; padding:15px 40px; border-radius:30px; font-weight:900; cursor:pointer;">დატრიალება (1.00 AKHO)</button>
        <div onclick="backToGamesList()" style="color:var(--gold); cursor:pointer; text-decoration: underline;">← უკან</div>
    </div>

    <div id="lottoGameContainer" class="game-container">
        <h3 style="color:var(--gold); margin:0;">ციფრული ლოტო</h3>
        <div id="lottoMachine" style="width:100%; height:80px; background:#111; border-radius:15px; border:2px solid #333; display:flex; align-items:center; justify-content:center; gap:8px;">
            <div id="lottoBallsContainer" style="display:flex; gap:8px;">
                <div class="empty-slot">?</div>
                <div class="empty-slot">?</div>
                <div class="empty-slot">?</div>
                <div class="empty-slot">?</div>
                <div class="empty-slot">?</div>
            </div>
        </div>
        <div id="lottoGrid" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:8px; width:100%;"></div>
        <button id="playLottoBtn" onclick="startLottoDraw()" style="background:linear-gradient(180deg, #4CAF50, #2E7D32); color:white; border:none; padding:15px; border-radius:30px; width:100%; font-weight:bold; cursor:pointer;">ბილეთის დადასტურება (5.00 AKHO)</button>
        <div onclick="backToGamesList()" style="color:var(--gold); cursor:pointer; text-decoration: underline;">← უკან</div>
    </div>
    
    <div id="burningSlotsContainer" class="game-container">
        <h3 style="color:var(--gold); margin:0;">Burning Slots</h3>
        <div style="color:#888;">მოგება: <span id="slotWinVal" style="color:white; font-weight:bold;">0.00</span> AKHO</div>
        <div class="slot-window">
            <div class="reels-wrapper-flex" id="reelsWrapper">
                <div id="reel_1" class="reel"><div class="reel-cell">❓</div></div>
                <div id="reel_2" class="reel"><div class="reel-cell">❓</div></div>
                <div id="reel_3" class="reel"><div class="reel-cell">❓</div></div>
            </div>
        </div>
        <button id="spinSlotBtn" onclick="triggerBurningSpin()" style="background:linear-gradient(180deg, #ffd700, #b8860b); color:black; border:none; padding:18px; border-radius:50px; width:100%; font-weight:bold; cursor:pointer;">SPIN (0.20 AKHO)</button>
        <div onclick="backFromSlots()" style="color:var(--gold); cursor:pointer; text-decoration: underline;">← უკან</div>
    </div>

    <div id="kingOfAkhoContainer" class="game-container">
        <div id="kingMultiplier" style="padding:10px 20px; border-radius:10px; color:gold; font-weight:bold;">Multiplier: x1</div>
        <div id="kingGrid" style="display:grid; grid-template-columns:repeat(5, 1fr); gap:5px;"></div>
        <button id="kingStartBtn" onclick="startKingSpin()" style="background:linear-gradient(180deg, #ffd700, #b8860b); color:black; border:none; padding:15px; border-radius:15px; width:100%; font-weight:bold; cursor:pointer;">START (10.00 AKHO)</button>
        <div onclick="backToGamesListFromKing()" style="color:var(--gold); cursor:pointer; text-decoration:underline;">← უკან</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
    // --- გლობალური ცვლადები და კონფიგურაცია ---
    let userBalance = 0;
    const burningIcons = ['7️⃣', '🍉', '🍇', '🔔', '🍒', '🍋', '⭐'];
    let burningStake = 0.20;  
    let isSpinningNow = false;

    // ხმოვანი ფაილები
    const bgMusic = new Audio('https://raw.githubusercontent.com/jimsher/Emigrantbook/main/u_edtmwfwu7c-over-the-horizon-329304.mp3');
    const ballPopSnd = new Audio('https://raw.githubusercontent.com/jimsher/Emigrantbook/main/u_edtmwfwu7c-pop-331070.mp3');
    const winSnd = new Audio('https://raw.githubusercontent.com/jimsher/Emigrantbook/main/breakzstudios-upbeat-p-170110.mp3');
    bgMusic.loop = true; bgMusic.volume = 0.2;

    // ფულის შემოწმების დამხმარე ფუნქციები
    function canAfford(amount) {
        return userBalance >= amount;
    }

    function spendAkho(amount, reason) {
        const user = firebase.auth().currentUser;
        if(user) {
            userBalance -= amount;
            firebase.database().ref(`users/${user.uid}/akho`).set(userBalance);
        }
    }

    function earnAkho(uid, amount, reason) {
        userBalance += amount;
        firebase.database().ref(`users/${uid}/akho`).set(userBalance);
    }

    // ბალანსის რეალურ დროში მოსმენა
    firebase.auth().onAuthStateChanged(user => {
        if (user) {
            firebase.database().ref(`users/${user.uid}/akho`).on('value', snap => {
                userBalance = snap.val() || 0;
                document.getElementById('gameBalance').innerText = userBalance.toFixed(2) + " AKHO";
            });
        }
    });

    // ნავიგაციის ძირითადი ფუნქციები
    function openGamesPage() {
        document.getElementById('gamesPage').style.display = 'flex';
        bgMusic.play().catch(() => {
            window.addEventListener('click', () => { bgMusic.play(); }, { once: true });
        });
    }

    function closeGamesPage() {
        document.getElementById('gamesPage').style.display = 'none';
        bgMusic.pause(); bgMusic.currentTime = 0;
    }

    function backToGamesList() {
        document.getElementById('wheelGameContainer').style.display = 'none';
        document.getElementById('lottoGameContainer').style.display = 'none';
        document.getElementById('gamesList').style.display = 'grid';
    }

    // --- 1. იღბლიანი ბორბალი ---
    const prizes = [0.5, 2, 0, 5, 1, 0.5, 10, 0]; 
    const colors = ["#1a1a1a", "#d4af37", "#1a1a1a", "#d4af37", "#1a1a1a", "#d4af37", "#ff4d4d", "#1a1a1a"];
    let currentRotation = 0;
    let isSpinning = false;

    function playGame(type) {
        if(type === 'spin') {
            document.getElementById('gamesList').style.display = 'none';
            document.getElementById('wheelGameContainer').style.display = 'flex';
            setTimeout(drawWheel, 100);
        }
    }

    function drawWheel() {
        const canvas = document.getElementById('wheelCanvas');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        const center = 140;
        const sliceAngle = (2 * Math.PI) / prizes.length;
        ctx.clearRect(0, 0, 280, 280);

        prizes.forEach((prize, i) => {
            ctx.beginPath(); ctx.fillStyle = colors[i]; ctx.moveTo(center, center);
            ctx.arc(center, center, center, i * sliceAngle, (i + 1) * sliceAngle); ctx.fill();
            ctx.save(); ctx.translate(center, center); ctx.rotate(i * sliceAngle + sliceAngle / 2);
            ctx.fillStyle = "white"; ctx.font = "bold 14px Arial"; ctx.textAlign = "right";
            ctx.fillText(prize + " ₳", center - 20, 5); ctx.restore();
        });
    }

    function spinWheel() {
        if(isSpinning || !canAfford(1.00)) { if(!canAfford(1.00)) alert("ბალანსი არ გყოფნის!"); return; }
        isSpinning = true;
        spendAkho(1.00, "Lucky Spin Bet");

        const canvas = document.getElementById('wheelCanvas');
        const btn = document.getElementById('spinBtn');
        btn.disabled = true; btn.innerText = "ტრიალებს...";

        const extraDegrees = Math.floor(Math.random() * 360) + 2160; 
        currentRotation += extraDegrees;
        canvas.style.transition = "transform 5s cubic-bezier(0.15, 0, 0.2, 1)";
        canvas.style.transform = `rotate(${currentRotation}deg)`;

        setTimeout(() => {
            isSpinning = false; btn.disabled = false; btn.innerText = "დატრიალება (1.00 AKHO)";
            const actualDeg = currentRotation % 360;
            const sliceSize = 360 / prizes.length;
            const prizeIndex = Math.floor(((360 - actualDeg + 270) % 360) / sliceSize) % prizes.length;
            const win = prizes[prizeIndex];
            
            if(win > 0) {
                winSnd.play().catch(()=>{});
                earnAkho(firebase.auth().currentUser.uid, win, "Lucky Spin Win");
                alert("🎉 გილოცავ! შენ მოიგე " + win + " AKHO!");
            } else {
                alert("😢 ამჯერად ვერ მოიგე, სცადე კიდევ ერთხელ!");
            }
        }, 5000);
    }

    // --- 2. ციფრული ლოტო ---
    let selectedNumbers = [];

    function openLotto() {
        document.getElementById('gamesList').style.display = 'none';
        document.getElementById('lottoGameContainer').style.display = 'flex';
        
        const container = document.getElementById('lottoBallsContainer');
        container.innerHTML = '<div class="empty-slot">?</div>'.repeat(5);

        const grid = document.getElementById('lottoGrid');
        grid.innerHTML = ""; selectedNumbers = [];
        
        for(let i=1; i<=25; i++) {
            const btn = document.createElement('button');
            btn.className = 'num-btn'; btn.innerText = i;
            btn.onclick = () => {
                if(selectedNumbers.includes(i)) {
                    selectedNumbers = selectedNumbers.filter(n => n !== i); btn.classList.remove('selected');
                } else if(selectedNumbers.length < 5) {
                    selectedNumbers.push(i); btn.classList.add('selected');
                }
            };
            grid.appendChild(btn);
        }
    }

    async function startLottoDraw() {
        if(selectedNumbers.length < 5) { alert("გთხოვთ აირჩიოთ 5 ციფრი!"); return; }
        if(!canAfford(5.00)) { alert("ბალანსი არ გყოფნის (5.00 AKHO)"); return; }

        spendAkho(5.00, "Lotto Bet");
        const btn = document.getElementById('playLottoBtn');
        btn.disabled = true;

        const container = document.getElementById('lottoBallsContainer');
        container.innerHTML = ""; 

        let winningNumbers = [];
        while(winningNumbers.length < 5) {
            let n = Math.floor(Math.random() * 25) + 1;
            if(!winningNumbers.includes(n)) winningNumbers.push(n);
        }

        for(let i = 0; i < 5; i++) {
            await new Promise(r => setTimeout(r, 800)); 
            ballPopSnd.currentTime = 0; ballPopSnd.play().catch(()=>{});

            const ball = document.createElement('div');
            ball.className = 'lotto-ball'; ball.innerText = winningNumbers[i];
            container.appendChild(ball);
        }

        setTimeout(() => {
            const matches = selectedNumbers.filter(n => winningNumbers.includes(n)).length;
            let prize = 0;
            if(matches === 2) prize = 2;
            if(matches === 3) prize = 10;
            if(matches === 4) prize = 50;
            if(matches === 5) prize = 250;

            if(prize > 0) {
                winSnd.play().catch(()=>{});
                earnAkho(firebase.auth().currentUser.uid, prize, `Lotto Win`);
                alert(`🎉 გილოცავ! შენ დასვი ${matches} ციფრი და მოიგე ${prize} AKHO!`);
            } else {
                alert(`ამჯერად მხოლოდ ${matches} ციფრი დაემთხვა. სცადე კიდევ ერთხელ!`);
            }
            btn.disabled = false;
        }, 500);
    }

    // --- 3. BURNING SLOTS (🎰 სრულად გამართული ფიზიკური ტრიალი) ---
    function openBurningSlots() {
        document.getElementById('gamesList').style.display = 'none';
        document.getElementById('burningSlotsContainer').style.display = 'flex';
        document.getElementById('slotWinVal').innerText = "0.00";
    }

    function backFromSlots() {
        document.getElementById('burningSlotsContainer').style.display = 'none';
        document.getElementById('gamesList').style.display = 'grid';
    }

    function triggerBurningSpin() {
        if (isSpinningNow || !canAfford(burningStake)) { if(!canAfford(burningStake)) alert("ბალანსი არ გყოფნის!"); return; }

        isSpinningNow = true;
        spendAkho(burningStake, 'Burning Slots Bet');
        document.getElementById('slotWinVal').innerText = "0.00";

        ballPopSnd.currentTime = 0; ballPopSnd.play().catch(()=>{});

        // მოგების მათემატიკა და ალბათობა
        const rand = Math.random();
        let result = []; let winAmt = 0;

        if (rand < 0.02) { result = ['7️⃣', '7️⃣', '7️⃣']; winAmt = burningStake * 100; } 
        else if (rand < 0.06) { let icon = Math.random() < 0.5 ? '🍉' : '🍇'; result = [icon, icon, icon]; winAmt = burningStake * 20; } 
        else if (rand < 0.12) { result = ['🔔', '🔔', '🔔']; winAmt = burningStake * 8; } 
        else if (rand < 0.22) { let fruit = ['🍒', '🍋'][Math.floor(Math.random()*2)]; result = [fruit, fruit, fruit]; winAmt = burningStake * 4; } 
        else {
            while(true) {
                result = [
                    burningIcons[Math.floor(Math.random() * burningIcons.length)],
                    burningIcons[Math.floor(Math.random() * burningIcons.length)],
                    burningIcons[Math.floor(Math.random() * burningIcons.length)]
                ];
                if (!(result[0] === result[1] && result[1] === result[2])) break;
            }
            winAmt = 0;
        }

        // ფიზიკური ზოლის აგება და დატრიალება ანიმაციით
        for (let i = 1; i <= 3; i++) {
            const r = document.getElementById('reel_' + i);
            r.innerHTML = ''; 
            
            // ვქმნით 40 ელემენტს ილუზიისთვის
            for (let j = 0; j < 40; j++) {
                const s = document.createElement('div');
                s.className = 'reel-cell';
                s.innerText = burningIcons[Math.floor(Math.random() * burningIcons.length)];
                r.appendChild(s);
            }

            r.style.transition = 'none';
            r.style.transform = 'translateY(0)';
            
            const stopIdx = 30; // გაჩერების წერტილი
            r.children[stopIdx].innerText = result[i-1];

            setTimeout(() => {
                r.style.transition = `transform ${1.5 + (i * 0.4)}s cubic-bezier(0.15, 0.85, 0.35, 1)`;
                r.style.transform = `translateY(-${stopIdx * 70}px)`;
            }, 50);
        }

        setTimeout(() => {
            isSpinningNow = false;
            if (winAmt > 0) {
                winSnd.currentTime = 0; winSnd.play().catch(()=>{});
                earnAkho(firebase.auth().currentUser.uid, winAmt, '3-Reel Win');
                document.getElementById('slotWinVal').innerText = winAmt.toFixed(2);
                alert(`🎉 გილოცავ! შენ მოიგე ${winAmt.toFixed(2)} AKHO!`);
            }
        }, 3000);
    }

    // --- 4. KING OF AKHO ---
    const kingIcons = ['👑', '🦁', '💎', '💰', '🍇', '🍉', '🔔', '7️⃣'];
    let kingStake = 10.00;
    let currentMultiplier = 1;
    let isKingSpinning = false;

    function openKingOfAkho() {
        document.getElementById('gamesList').style.display = 'none';
        document.getElementById('kingOfAkhoContainer').style.display = 'flex';
        initializeKingGrid();
    }

    function backToGamesListFromKing() {
        if (isKingSpinning) return;
        document.getElementById('kingOfAkhoContainer').style.display = 'none';
        document.getElementById('gamesList').style.display = 'grid';
    }

    function initializeKingGrid() {
        const grid = document.getElementById('kingGrid');
        grid.innerHTML = ''; currentMultiplier = 1; updateKingUI();
        for (let i = 0; i < 25; i++) {
            const cell = document.createElement('div');
            cell.className = 'king-cell';
            cell.innerText = kingIcons[Math.floor(Math.random() * kingIcons.length)];
            grid.appendChild(cell);
        }
    }

    function updateKingUI() {
        document.getElementById('kingMultiplier').innerText = `Multiplier: x${currentMultiplier}`;
    }

    async function startKingSpin() {
        if (isKingSpinning || !canAfford(kingStake)) { if(!canAfford(kingStake)) alert("ბალანსი არ გყოფნის!"); return; }
        isKingSpinning = true; currentMultiplier = 1; updateKingUI();
        spendAkho(kingStake, 'King Of Akho Bet');

        await dropNewSymbols();
        processRound();
    }

    async function dropNewSymbols() {
        const cells = document.querySelectorAll('.king-cell');
        for (let i = 0; i < cells.length; i++) {
            cells[i].style.opacity = "0";
            cells[i].style.transform = "translateY(-20px)";
            cells[i].innerText = kingIcons[Math.floor(Math.random() * kingIcons.length)];
            
            setTimeout(() => {
                cells[i].style.transition = "all 0.2s ease-out";
                cells[i].style.opacity = "1"; cells[i].style.transform = "translateY(0)";
            }, i * 15);
        }
        await new Promise(r => setTimeout(r, 500));
    }

    function processRound() {
        const cells = document.querySelectorAll('.king-cell');
        let symbolsOnScreen = Array.from(cells).map(c => c.innerText);
        let counts = {};
        symbolsOnScreen.forEach(s => counts[s] = (counts[s] || 0) + 1);

        let winningSymbol = null; let winCount = 0;
        for (let sym in counts) {
            if (counts[sym] >= 8) { winningSymbol = sym; winCount = counts[sym]; break; }
        }

        if (winningSymbol) { handleWin(winningSymbol, winCount); } 
        else { isKingSpinning = false; }
    }

    async function handleWin(symbol, count) {
        const cells = document.querySelectorAll('.king-cell');
        let winAmount = (count * 0.5) * currentMultiplier;

        cells.forEach(cell => {
            if (cell.innerText === symbol) {
                cell.style.background = "gold"; cell.style.transform = "scale(0.6)"; cell.style.opacity = "0";
            }
        });

        earnAkho(firebase.auth().currentUser.uid, winAmount, 'King Win');
        currentMultiplier++; updateKingUI();
        winSnd.currentTime = 0; winSnd.play().catch(()=>{});

        setTimeout(() => {
            cells.forEach(cell => {
                if (cell.style.opacity === "0") {
                    cell.innerText = kingIcons[Math.floor(Math.random() * kingIcons.length)];
                    cell.style.opacity = "1"; cell.style.transform = "scale(1)"; cell.style.background = "#1a1a1a";
                }
            });
            setTimeout(processRound, 400);
        }, 500);
    }

    // გახსნის ივენთი რომ საიტი პირდაპირ მზად იყოს
    window.onload = () => { console.log("Emigrantbook Game Engine Active."); };
</script>
