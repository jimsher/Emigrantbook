<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emigrantbook Games</title>
    <style>
        body { background: #000; color: #fff; font-family: Arial, sans-serif; margin: 0; padding: 10px; }
        #gamesPage { width: 100%; max-width: 500px; margin: 0 auto; }
        #gameBalance { font-size: 20px; color: #d4af37; text-align: center; margin: 15px 0; }
        .games-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .games-grid button { background: #1a1a1a; color: #d4af37; border: 1px solid #d4af37; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .game-container { display: none; border: 1px solid #333; padding: 10px; border-radius: 10px; background: #0a0a0a; margin-top: 10px; flex-direction: column; align-items: center; width: 100%; box-sizing: border-box; }
        canvas { max-width: 100% !important; height: auto !important; }
        .reels-wrapper { width: 100%; display: flex; justify-content: center; }
        .reel { width: 70px; height: 70px; border: 1px solid #d4af37; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .num-btn { padding: 10px; border: 1px solid #444; background: #222; cursor: pointer; }
        .num-btn.selected { background: #d4af37; }
        .lotto-ball { width: 30px; height: 30px; background: #d4af37; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #000; font-weight: bold; }
        .king-cell { width: 40px; height: 40px; background: #1a1a1a; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="gamesPage">
        <a href="index.html" style="color:#888; text-decoration:none; display: block; margin-bottom: 10px;">← უკან</a>
        <div id="gameBalance">0.00 AKHO</div>

        <div id="gamesList" class="games-grid">
            <button onclick="playGame('spin')">Lucky Spin</button>
            <button onclick="openLotto()">Lotto 5/25</button>
            <button onclick="openBurningSlots()">Burning Slots</button>
            <button onclick="openKingOfAkho()">King of Akho</button>
        </div>

        <div id="wheelGameContainer" class="game-container">
            <canvas id="wheelCanvas" width="280" height="280"></canvas>
            <button id="spinBtn" onclick="spinWheel()" style="margin-top:10px;">დატრიალება (1.00 AKHO)</button>
            <button onclick="backToGamesList()" style="margin-top:10px;">უკან</button>
        </div>

        <div id="lottoGameContainer" class="game-container">
            <div id="lottoGrid" class="lotto-grid"></div>
            <div id="lottoBalls"></div>
            <button id="playLottoBtn" onclick="startLottoDraw()">დაწყება (5.00 AKHO)</button>
            <button onclick="backToGamesList()" style="margin-top:10px;">უკან</button>
        </div>

        <div id="burningSlotsContainer" class="game-container">
            <div id="reelsWrapper" class="reels-wrapper">
                <div id="reel_1" class="reel"></div>
                <div id="reel_2" class="reel"></div>
                <div id="reel_3" class="reel"></div>
            </div>
            <button onclick="triggerBurningSpin()">Spin</button>
            <button onclick="backFromSlots()" style="margin-top:10px;">უკან</button>
        </div>
        
        <div id="kingOfAkhoContainer" class="game-container">
            <div id="kingMultiplier">Multiplier: x1</div>
            <div id="kingGrid" class="king-grid"></div>
            <button onclick="startKingSpin()">Start King Spin</button>
            <button onclick="backToGamesListFromKing()" style="margin-top:10px;">უკან</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyDA1MD_juyLU26Nytxn7kzEcBkpVhS3rbk", 
            authDomain: "emigrantbook.firebaseapp.com", 
            databaseURL: "https://emigrantbook-default-rtdb.europe-west1.firebasedatabase.app", 
            projectId: "emigrantbook", 
            storageBucket: "emigrantbook.firebasestorage.app", 
            appId: "1:138873748174:web:2d4422cdd62cd7e594ee9f" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // აქ არის შენი მოწოდებული JS კოდი სრულად:
        
        function openGamesPage() {
            document.getElementById('gamesPage').style.display = 'flex';
            db.ref(`users/${auth.currentUser.uid}/akho`).on('value', snap => {
                document.getElementById('gameBalance').innerText = (snap.val() || 0).toFixed(2) + " AKHO";
            });
        }
        function closeGamesPage() {
            document.getElementById('gamesPage').style.display = 'none';
        }
        function playGame(gameType) {
            if (confirm("ნამდვილად გსურთ თამაშის დაწყება? (1.00 AKHO)")) {
                if(canAfford(1.00)) {
                    spendAkho(1.00, 'Game: ' + gameType);
                }
            }
        }
        function updateGameBalance() {
            const user = auth.currentUser;
            if (user) {
                db.ref(`users/${user.uid}/akho`).on('value', snap => {
                    const bal = snap.val() || 0;
                    const balElem = document.getElementById('gameBalance');
                    if(balElem) balElem.innerText = bal.toFixed(2) + " AKHO";
                });
            }
        }

        const prizes = [0.5, 2, 0, 5, 1, 0.5, 10, 0]; 
        const colors = ["#1a1a1a", "#d4af37", "#1a1a1a", "#d4af37", "#1a1a1a", "#d4af37", "#ff4d4d", "#1a1a1a"];
        let currentRotation = 0;
        let isSpinning = false;

        function backToGamesList() {
            document.getElementById('wheelGameContainer').style.display = 'none';
            document.getElementById('gamesList').style.display = 'grid';
        }

        function playGame(type) {
            if(type === 'spin') {
                document.getElementById('gamesList').style.display = 'none';
                document.getElementById('wheelGameContainer').style.display = 'flex';
                setTimeout(drawWheel, 100);
            }
        }

        function drawWheel() {
            const canvas = document.getElementById('wheelCanvas');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            const center = 140;
            const sliceAngle = (2 * Math.PI) / prizes.length;
            ctx.clearRect(0, 0, 280, 280);
            prizes.forEach((prize, i) => {
                ctx.beginPath();
                ctx.fillStyle = colors[i];
                ctx.moveTo(center, center);
                ctx.arc(center, center, center, i * sliceAngle, (i + 1) * sliceAngle);
                ctx.fill();
                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(i * sliceAngle + sliceAngle / 2);
                ctx.fillStyle = "white";
                ctx.font = "bold 14px Arial";
                ctx.textAlign = "right";
                ctx.fillText(prize + " ₳", center - 20, 5);
                ctx.restore();
            });
        }

        function spinWheel() {
            if(isSpinning) return;
            if(!canAfford(1.00)) { alert("ბალანსი არ გყოფნის!"); return; }
            spendAkho(1.00, "Lucky Spin Bet");
            isSpinning = true;
            const canvas = document.getElementById('wheelCanvas');
            const btn = document.getElementById('spinBtn');
            btn.disabled = true;
            btn.style.opacity = "0.5";
            btn.innerText = "ტრიალებს...";
            const extraDegrees = Math.floor(Math.random() * 360) + 2160; 
            currentRotation += extraDegrees;
            canvas.style.transition = "transform 5s cubic-bezier(0.15, 0, 0.2, 1)";
            canvas.style.transform = `rotate(${currentRotation}deg)`;
            setTimeout(() => {
                isSpinning = false;
                btn.disabled = false;
                btn.style.opacity = "1";
                btn.innerText = "დატრიალება (1.00 AKHO)";
                const actualDeg = currentRotation % 360;
                const sliceSize = 360 / prizes.length;
                const prizeIndex = Math.floor(((360 - actualDeg + 270) % 360) / sliceSize) % prizes.length;
                const win = prizes[prizeIndex];
                if(win > 0) {
                    earnAkho(auth.currentUser.uid, win, "Lucky Spin Win");
                    updateGameBalance(); 
                    alert("🎉 გილოცავ! შენ მოიგე " + win + " AKHO!");
                } else {
                    alert("😢 ამჯერად ვერ მოიგე!");
                }
            }, 5000);
        }

        let selectedNumbers = [];
        function openLotto() {
            document.getElementById('gamesList').style.display = 'none';
            document.getElementById('lottoGameContainer').style.display = 'flex';
            const grid = document.getElementById('lottoGrid');
            grid.innerHTML = "";
            selectedNumbers = [];
            for(let i=1; i<=25; i++) {
                const btn = document.createElement('button');
                btn.className = 'num-btn';
                btn.innerText = i;
                btn.onclick = () => toggleNumber(i, btn);
                grid.appendChild(btn);
            }
        }

        function toggleNumber(num, btn) {
            if(selectedNumbers.includes(num)) {
                selectedNumbers = selectedNumbers.filter(n => n !== num);
                btn.classList.remove('selected');
            } else {
                if(selectedNumbers.length < 5) {
                    selectedNumbers.push(num);
                    btn.classList.add('selected');
                }
            }
        }

        async function startLottoDraw() {
            if(selectedNumbers.length < 5) { alert("გთხოვთ აირჩიოთ 5 ციფრი!"); return; }
            if(!canAfford(5.00)) { alert("ბალანსი არ გყოფნის (5.00 AKHO)"); return; }
            spendAkho(5.00, "Lotto Bet");
            const btn = document.getElementById('playLottoBtn');
            btn.disabled = true;
            const container = document.getElementById('lottoBalls');
            container.innerHTML = "";
            let winningNumbers = [];
            while(winningNumbers.length < 5) {
                let n = Math.floor(Math.random() * 25) + 1;
                if(!winningNumbers.includes(n)) winningNumbers.push(n);
            }
            for(let i=0; i<5; i++) {
                await new Promise(r => setTimeout(r, 800));
                ballPopSnd.currentTime = 0;
                ballPopSnd.play();
                const ball = document.createElement('div');
                ball.className = 'lotto-ball';
                ball.innerText = winningNumbers[i];
                container.appendChild(ball);
            }
            setTimeout(() => {
                const matches = selectedNumbers.filter(n => winningNumbers.includes(n)).length;
                if(matches >= 2) {
                    winSnd.play();
                    alert(`🎉 მოიგე! ${matches} ციფრი დაემთხვა!`);
                } else {
                    alert(`ამჯერად ვერ მოიგე.`);
                }
                btn.disabled = false;
            }, 500);
        }

        const bgMusic = new Audio('https://raw.githubusercontent.com/jimsher/Emigrantbook/main/u_edtmwfwu7c-over-the-horizon-329304.mp3');
        const ballPopSnd = new Audio('https://raw.githubusercontent.com/jimsher/Emigrantbook/main/u_edtmwfwu7c-pop-331070.mp3');
        const winSnd = new Audio('https://raw.githubusercontent.com/jimsher/Emigrantbook/main/breakzstudios-upbeat-p-170110.mp3');
        
        bgMusic.loop = true;
        bgMusic.volume = 0.3;
        bgMusic.crossOrigin = "anonymous";
        ballPopSnd.crossOrigin = "anonymous";
        winSnd.crossOrigin = "anonymous";

        var burningIcons = ['7️⃣', '🍉', '🍇', '🔔', '🍒', '🍋', '⭐'];
        var slot5Icons = ['7️⃣', '🍉', '🍇', '🔔', '🍒', '🍋', '🍊', '⭐', '💲'];
        var burningStake = 0.15;
        var burningStake5 = 0.20;
        var isSpinningNow = false;
        var isSpinning5 = false;

        function updateAllGameBalances() {
            const val = (typeof myAkho !== 'undefined') ? myAkho : 0;
            const akhoStr = val.toFixed(2);
            document.getElementById('gameBalance').innerText = akhoStr + " ₳";
        }

        function triggerBurningSpin() {
            if (isSpinningNow || !canAfford(burningStake)) return;
            isSpinningNow = true;
            spendAkho(burningStake, '3-Reel Bet');
            let result = [];
            while(true) {
                result = [burningIcons[Math.floor(Math.random()*7)], burningIcons[Math.floor(Math.random()*7)], burningIcons[Math.floor(Math.random()*7)]];
                if (!(result[0] === result[1] && result[1] === result[2])) break;
            }
            for (let i = 1; i <= 3; i++) {
                const r = document.getElementById('reel_' + i);
                r.innerHTML = '';
                for(let j=0; j<40; j++) {
                    const s = document.createElement('div');
                    s.style="height:70px; display:flex; align-items:center; justify-content:center; font-size:45px;";
                    s.innerText = burningIcons[Math.floor(Math.random()*7)];
                    r.appendChild(s);
                }
                r.style.transform = `translateY(-${30 * 70}px)`;
            }
            setTimeout(() => { isSpinningNow = false; }, 3200);
        }

        function openKingOfAkho() {
            document.getElementById('gamesList').style.display = 'none';
            document.getElementById('kingOfAkhoContainer').style.display = 'flex';
            initializeKingGrid();
        }

        function backToGamesListFromKing() {
            document.getElementById('kingOfAkhoContainer').style.display = 'none';
            document.getElementById('gamesList').style.display = 'grid';
        }

        function initializeKingGrid() {
            const grid = document.getElementById('kingGrid');
            grid.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'king-cell';
                cell.innerText = ['👑', '🦁', '💎', '💰', '🍇'][Math.floor(Math.random() * 5)];
                grid.appendChild(cell);
            }
        }

    </script>
</body>
</html>
