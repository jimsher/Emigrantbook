<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ემიგრანტთა ფონდი - Emigrantbook</title>
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="fund-style.css">
</head>
<body>

    <header id="main-header">
        </header>

    <main class="fund-container">
        <section class="fund-hero">
            <h1>ემიგრანტთა ფონდი</h1>
            <p>ერთად დავეხმაროთ თანამემამულეებს მთელ მსოფლიოში.</p>
        </section>

        <section class="fund-stats">
            <div class="stat-card">
                <h3 id="total-raised">0 ₾</h3>
                <p>შეგროვებული თანხა</p>
            </div>
            <div class="stat-card">
                <h3 id="donors-count">0</h3>
                <p>დონორი</p>
            </div>
        </section>

        <section class="donation-methods">
            <h2>შემოწირულობის მეთოდები</h2>
            <div class="grid">
                <div class="method-card">
                    <img src="bank-icon.png" alt="Bank">
                    <h3>საბანკო გადარიცხვა</h3>
                    <p>GE00TB0000000000000000</p>
                </div>
                <div class="method-card">
                    <img src="card-icon.png" alt="Card">
                    <h3>ბარათით გადახდა</h3>
                    <button class="btn-donate">გადახდა</button>
                </div>
            </div>
        </section>

        <section class="urgent-cases">
    <h2>გადაუდებელი დახმარება</h2>
    <div class="case-card">
        <h3>სამედიცინო დახმარება - იტალია</h3>
        <p>საჭიროა 2,000 ევრო ოპერაციისთვის.</p>
        <div class="progress-bar">
            <div class="progress" style="width: 45%;">45%</div>
        </div>
        <button class="btn-donate-small">დახმარება</button>
    </div>
</section>
    </main>

    <footer id="main-footer">
        </footer>

    <script src="js/main.js"></script>
    <script src="fund.js"></script>
</body>
</html>
