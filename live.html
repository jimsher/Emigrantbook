<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impact Delivery - Emigrantbook</title>
    <link rel="stylesheet" href="live.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        
    </style>
</head>
<body>

    <div class="delivery-header">
        <i class="fas fa-chevron-left" onclick="history.back()"></i>
        <h2>Impact Delivery</h2>
        <div class="cart-btn" onclick="toggleCart()">
            <i class="fas fa-shopping-basket"></i>
            <span id="cartCount">0</span>
        </div>
    </div>

    <div class="categories" id="catList">
        <div class="cat-item active" onclick="filterMenu('all', this)">ყველა</div>
        <div class="cat-item" onclick="filterMenu('ხინკალი', this)">ხინკალი</div>
        <div class="cat-item" onclick="filterMenu('ხაჭაპური', this)">ხაჭაპური</div>
        <div class="cat-item" onclick="filterMenu('მწვადი', this)">მწვადი</div>
        <div class="cat-item" onclick="filterMenu('სასმელი', this)">სასმელები</div>
    </div>

    <div class="menu-grid" id="menuGrid">
        </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <img src="" id="modImg" class="customize-img">
            <h2 id="modTitle"></h2>
            <p id="modDesc" style="color: gray; font-size: 13px; margin-top: 5px;"></p>
            
            <div class="option-group">
                <h4>დაამატეთ ინგრედიენტები</h4>
                <div id="ingredientsBox">
                    </div>
            </div>

            <div class="footer-actions">
                <div class="qty-box">
                    <button onclick="changeQty(-1)">-</button>
                    <span id="qtyVal" style="width: 30px; text-align: center; font-weight: bold;">1</span>
                    <button onclick="changeQty(1)">+</button>
                </div>
                <button class="add-to-cart-btn" onclick="addToCart()">კალათაში დამატება</button>
            </div>
            <p onclick="closeModal()" style="text-align: center; margin-top: 20px; color: #555; cursor: pointer;">გაუქმება</p>
        </div>
    </div>






    <div id="productDetailSide" class="product-side-page">
    <div class="side-header">
        <i class="fas fa-arrow-left" onclick="closeProductPage()"></i>
        <span>შეკვეთის დეტალები</span>
    </div>
    
    <div class="side-content">
        <img src="" id="sideImg" class="side-hero-img">
        <div class="side-info">
            <h2 id="sideTitle"></h2>
            <p id="sideDesc"></p>
        </div>

        <div class="side-section">
            <h4><i class="fas fa-plus-circle"></i> დაამატეთ ინგრედიენტები</h4>
            <div id="sideIngredients" class="ingredients-list"></div>
        </div>

        <div class="side-section">
            <h4><i class="fas fa-credit-card"></i> გადახდის მეთოდი</h4>
            <div class="payment-options">
                <label class="pay-item">
                    <input type="radio" name="payMethod" value="akho" checked>
                    <span><i class="fas fa-wallet"></i> AKHO ბალანსი</span>
                </label>
                <label class="pay-item">
                    <input type="radio" name="payMethod" value="card">
                    <span><i class="fas fa-university"></i> რეალური თანხა (ბარათი)</span>
                </label>
                <label class="pay-item">
                    <input type="radio" name="payMethod" value="cash">
                    <span><i class="fas fa-truck"></i> კურიერთან ნაღდი ანგარიშსწორება</span>
                </label>
            </div>
        </div>
    </div>

    <div class="side-footer">
        <div class="qty-control">
            <button onclick="changeQty(-1)">-</button>
            <span id="sideQty">1</span>
            <button onclick="changeQty(1)">+</button>
        </div>
        <button class="main-action-btn" onclick="addToCart()">კალათაში დამატება</button>
    </div>
</div>

    

    

    
    <script src="live1.js"></script>
</body>
</html>
