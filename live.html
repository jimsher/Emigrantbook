<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impact Delivery - Emigrantbook</title>
    <link rel="stylesheet" href="live.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        
    </style>
</head>
<body>

    <div class="delivery-header">
        <i class="fas fa-chevron-left" onclick="history.back()"></i>
        <h2>Impact Delivery</h2>
        <div class="cart-btn" onclick="toggleCart()">
            <i class="fas fa-shopping-basket"></i>
            <span id="cartCount">0</span>
        </div>
    </div>

    <div class="categories" id="catList">
        <div class="cat-item active" onclick="filterMenu('all', this)">ყველა</div>
        <div class="cat-item" onclick="filterMenu('ხინკალი', this)">ხინკალი</div>
        <div class="cat-item" onclick="filterMenu('ხაჭაპური', this)">ხაჭაპური</div>
        <div class="cat-item" onclick="filterMenu('მწვადი', this)">მწვადი</div>
        <div class="cat-item" onclick="filterMenu('სასმელი', this)">სასმელები</div>
    </div>

    <div class="menu-grid" id="menuGrid">
        </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <img src="" id="modImg" class="customize-img">
            <h2 id="modTitle"></h2>
            <p id="modDesc" style="color: gray; font-size: 13px; margin-top: 5px;"></p>
            
            <div class="option-group">
                <h4>დაამატეთ ინგრედიენტები</h4>
                <div id="ingredientsBox">
                    </div>
            </div>

            <div class="footer-actions">
                <div class="qty-box">
                    <button onclick="changeQty(-1)">-</button>
                    <span id="qtyVal" style="width: 30px; text-align: center; font-weight: bold;">1</span>
                    <button onclick="changeQty(1)">+</button>
                </div>
                <button class="add-to-cart-btn" onclick="addToCart()">კალათაში დამატება</button>
            </div>
            <p onclick="closeModal()" style="text-align: center; margin-top: 20px; color: #555; cursor: pointer;">გაუქმება</p>
        </div>
    </div>




<div id="checkout-step" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#0a0a0a; z-index:99999; padding:20px; overflow-y:auto;">
    <div style="display:flex; align-items:center; gap:15px; margin-bottom:25px;">
        <i class="fas fa-arrow-left" onclick="document.getElementById('checkout-step').style.display='none'" style="font-size:20px; color:#d4af37;"></i>
        <h2 style="color:#d4af37; font-size:18px;">მიტანის მონაცემები</h2>
    </div>

    <div class="delivery-form">
        <input type="text" id="order-name" placeholder="სახელი და გვარი" style="width:100%; padding:15px; background:#1a1a1a; border:1px solid #333; color:white; border-radius:12px; margin-bottom:10px;">
        <input type="text" id="order-city" placeholder="ქალაქი" style="width:100%; padding:15px; background:#1a1a1a; border:1px solid #333; color:white; border-radius:12px; margin-bottom:10px;">
        <input type="text" id="order-addr" placeholder="მისამართი (ქუჩა, ნომერი)" style="width:100%; padding:15px; background:#1a1a1a; border:1px solid #333; color:white; border-radius:12px; margin-bottom:10px;">
        
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input type="text" id="order-build" placeholder="კორპუსი/ბინა" style="width:50%; padding:15px; background:#1a1a1a; border:1px solid #333; color:white; border-radius:12px;">
            <input type="number" id="order-floor" placeholder="სართული" style="width:50%; padding:15px; background:#1a1a1a; border:1px solid #333; color:white; border-radius:12px;">
        </div>

        <input type="tel" id="order-tel" placeholder="ტელეფონის ნომერი" style="width:100%; padding:15px; background:#1a1a1a; border:1px solid #333; color:white; border-radius:12px; margin-bottom:10px;">
        <input type="email" id="order-mail" placeholder="ელ-ფოსტა" style="width:100%; padding:15px; background:#1a1a1a; border:1px solid #333; color:white; border-radius:12px; margin-bottom:20px;">

        <h4 style="color:#d4af37; margin-bottom:10px;">გადახდის მეთოდი</h4>
        <select id="payment-method" style="width:100%; padding:15px; background:#1a1a1a; border:1px solid #333; color:white; border-radius:12px; margin-bottom:25px;">
            <option value="card">საბანკო ბარათი (Online)</option>
            <option value="cash">ანგარიშსწორება კურიერთან</option>
            <option value="akho">AKHO ტოკენებით გადახდა</option>
        </select>

        <button onclick="finalSubmitOrder()" style="width:100%; padding:18px; background:#d4af37; color:black; border:none; border-radius:15px; font-weight:bold; font-size:16px;">შეკვეთის დადასტურება</button>
    </div>
</div>

    

    

    

    
    <script src="live1.js"></script>
</body>
</html>
