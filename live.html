<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impact Delivery - Emigrantbook</title>
    <link rel="stylesheet" href="live.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        
    </style>
</head>
<body>

    <div class="delivery-header">
        <i class="fas fa-chevron-left" onclick="history.back()"></i>
        <h2>Impact Delivery</h2>
        <div class="cart-btn" onclick="toggleCart()">
            <i class="fas fa-shopping-basket"></i>
            <span id="cartCount">0</span>
        </div>
    </div>

    <div class="categories" id="catList">
        <div class="cat-item active" onclick="filterMenu('all', this)">ყველა</div>
        <div class="cat-item" onclick="filterMenu('ხინკალი', this)">ხინკალი</div>
        <div class="cat-item" onclick="filterMenu('ხაჭაპური', this)">ხაჭაპური</div>
        <div class="cat-item" onclick="filterMenu('მწვადი', this)">მწვადი</div>
        <div class="cat-item" onclick="filterMenu('სასმელი', this)">სასმელები</div>
    </div>

    <div class="menu-grid" id="menuGrid">
        </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <img src="" id="modImg" class="customize-img">
            <h2 id="modTitle"></h2>
            <p id="modDesc" style="color: gray; font-size: 13px; margin-top: 5px;"></p>
            
            <div class="option-group">
                <h4>დაამატეთ ინგრედიენტები</h4>
                <div id="ingredientsBox">
                    </div>
            </div>

            <div class="footer-actions">
                <div class="qty-box">
                    <button onclick="changeQty(-1)">-</button>
                    <span id="qtyVal" style="width: 30px; text-align: center; font-weight: bold;">1</span>
                    <button onclick="changeQty(1)">+</button>
                </div>
                <button class="add-to-cart-btn" onclick="addToCart()">კალათაში დამატება</button>
            </div>
            <p onclick="closeModal()" style="text-align: center; margin-top: 20px; color: #555; cursor: pointer;">გაუქმება</p>
        </div>
    </div>






    <div id="delivery-app">
    <header class="delivery-nav">
        <i class="fas fa-chevron-left" onclick="history.back()"></i>
        <span class="logo-text">IMPACT DELIVERY</span>
        <div class="cart-trigger" onclick="openCheckout()">
            <i class="fas fa-shopping-basket"></i>
            <span id="cart-badge">0</span>
        </div>
    </header>

    <div id="category-bar"></div>

    <div id="products-grid"></div>
</div>

<div id="customize-modal" class="modal">
    <div class="modal-body">
        <div id="modal-details"></div>
        <div class="options-container">
            <h4>პერსონალიზაცია</h4>
            <div id="extra-ingredients"></div>
        </div>
        <div class="modal-footer">
            <div class="quantity-picker">
                <button onclick="updateQty(-1)">-</button>
                <span id="current-qty">1</span>
                <button onclick="updateQty(1)">+</button>
            </div>
            <button class="confirm-btn" onclick="commitToCart()">დამატება</button>
        </div>
        <p class="cancel-link" onclick="closeModal()">გაუქმება</p>
    </div>
</div>

<div id="checkout-modal" class="modal">
    <div class="modal-body full-screen">
        <h3>შეკვეთის გაფორმება</h3>
        <div class="order-form">
            <input type="text" id="order-fullname" placeholder="სახელი და გვარი*">
            <input type="text" id="order-city" placeholder="ქალაქი*">
            <input type="text" id="order-address" placeholder="მისამართი (ქუჩა, ნომერი)*">
            <input type="text" id="order-building" placeholder="კორპუსი/ბინა/სართული">
            <input type="tel" id="order-phone" placeholder="ტელეფონი*">
            <input type="email" id="order-email" placeholder="ელ-ფოსტა">
            
            <h4>გადახდის მეთოდი</h4>
            <div class="payment-grid">
                <div class="pay-method active" id="pay-card" onclick="setPayment('card')">ბარათი</div>
                <div class="pay-method" id="pay-cash" onclick="setPayment('cash')">კურიერთან</div>
            </div>
            
            <div id="cart-total-display"></div>
            <button class="finalize-btn" onclick="sendOrderToFirebase()">შეკვეთის გაგზავნა</button>
        </div>
        <p class="cancel-link" onclick="closeCheckout()">დაბრუნება მენიუში</p>
    </div>
</div>

    

    

    
    <script src="live1.js"></script>
</body>
</html>
