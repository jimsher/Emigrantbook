<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <title>Emigrantbook Live</title>
    <style>
        #video-display-area {
            width: 100%;
            max-width: 800px;
            height: 500px;
            background: #222;
            margin: 20px auto;
            border-radius: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            overflow: hidden;
        }
        .controls { text-align: center; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h1 style="text-align:center;">პირდაპირი ეთერი</h1>

    <div id="video-display-area"></div>

    <div class="controls">
        <button id="join">ლაივის დაწყება</button>
        <button id="leave">გათიშვა</button>
    </div>

    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.23.1.js"></script>
    <script src="live.js"></script>

</body>
</html>
