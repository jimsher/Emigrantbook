<div id="deliveryPage" class="full-ui">
    <div class="delivery-header">
        <i class="fas fa-arrow-left" onclick="refreshHomeFeed()"></i>
        <h2>Food Delivery</h2>
        <div class="cart-icon-wrapper" onclick="openCart()">
            <i class="fas fa-shopping-basket"></i>
            <span id="cartCount">0</span>
        </div>
    </div>

    <div class="category-scroll">
        <button class="cat-btn active" onclick="loadCategory('all')">ყველა</button>
        <button class="cat-btn" onclick="loadCategory('khinkali')">ხინკალი</button>
        <button class="cat-btn" onclick="loadCategory('khachapuri')">ხაჭაპური</button>
        <button class="cat-btn" onclick="loadCategory('drinks')">სასმელები</button>
    </div>

    <div id="menuGrid" class="menu-grid">
        </div>
</div>

<div id="customizeModal" class="modal-overlay" style="display:none;">
    <div class="customize-box">
        <img id="customDishImg" src="" alt="">
        <h3 id="customDishName"></h3>
        <p id="customDishPrice"></p>
        
        <div class="ingredients-section">
            <h4>დაამატეთ ინგრედიენტები:</h4>
            <div id="ingredientsList">
                </div>
        </div>
        
        <div class="qty-control">
            <button onclick="changeQty(-1)">-</button>
            <span id="orderQty">1</span>
            <button onclick="changeQty(1)">+</button>
        </div>
        
        <button class="add-to-cart-final" onclick="confirmAddToCart()">კალათაში დამატება</button>
        <button class="close-modal" onclick="closeCustomize()">გაუქმება</button>
    </div>
</div>
