<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimum-scale=1.0">
  <title>Emigrantbook - Premium Edition</title>
  
  <script>
    // შეცდომის დამჭერი
    window.onerror = function(message, source, lineno, colno, error) {
      alert("აპლიკაციის შეცდომა!: " + message + "\nხაზი: " + lineno);
      return false;
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8/dist/umd/supabase.js"></script>
  
  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --accent-neon: #818cf8;
      --accent-green: #34d399;
      --glass-bg: rgba(255, 255, 255, 0.07);
      --glass-border: rgba(255, 255, 255, 0.12);
      --text-main: #f8fafc;
      --text-secondary: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background: var(--primary-gradient);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* კედლის პრემიუმ სტილი */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 20px;
      margin: 15px auto;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .glass-card:hover {
      box-shadow: 0 12px 40px 0 rgba(129, 140, 248, 0.15);
    }

    /* 1. ავტორიზაციის ეკრანი */
    #auth-screen {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .auth-container {
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(25px);
      padding: 40px 30px;
      border-radius: 24px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }

    .logo-glow {
      font-size: 36px;
      font-weight: 900;
      background: linear-gradient(to right, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }

    .input-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .input-group input, .input-group select, .input-group textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--glass-border);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      font-size: 14px;
      color: var(--text-main);
      outline: none;
      transition: all 0.3s ease;
    }

    .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
      border-color: var(--accent-neon);
      box-shadow: 0 0 15px rgba(129, 140, 248, 0.25);
      background: rgba(255, 255, 255, 0.08);
    }

    /* პრემიუმ ღილაკები */
    .btn-neon {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
      transition: all 0.3s ease;
    }

    .btn-neon:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(168, 85, 247, 0.6);
    }

    /* ჰედერი */
    .header {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--glass-border);
    }

    .header .logo-text {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(to right, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      cursor: pointer;
    }

    /* ავატარების სტილი */
    .header-avatar, .post-avatar, .profile-fb-avatar, .comment-box-avatar {
      border-radius: 50%;
      border: 2px solid var(--glass-border);
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      text-transform: uppercase;
      overflow: hidden;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.1);
    }

    .header-avatar { width: 44px; height: 44px; }
    .post-avatar { width: 44px; height: 44px; margin-right: 12px; }
    .comment-box-avatar { width: 36px; height: 36px; }

    /* პოსტის აწყობის ბლოკი */
    .create-post-card {
      margin-top: 20px;
    }

    .create-post-input {
      width: 100%;
      height: 70px;
      border: none;
      resize: none;
      background: transparent;
      outline: none;
      font-size: 16px;
      color: var(--text-main);
      margin-bottom: 12px;
    }

    .file-upload-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px dashed var(--glass-border);
      color: var(--text-main);
      padding: 12px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      width: 100%;
      transition: 0.3s;
    }

    .file-upload-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--accent-neon);
    }

    /* პოსტების კედლის პრემიუმ დიზაინი */
    .post-card {
      padding: 20px;
    }

    .post-header {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
    }

    .post-author {
      font-weight: 700;
      font-size: 16px;
      color: var(--text-main);
      cursor: pointer;
    }

    .post-author:hover {
      color: var(--accent-neon);
    }

    .post-time {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .post-content {
      font-size: 15px;
      line-height: 1.6;
      color: #e2e8f0;
      margin-bottom: 15px;
    }

    .post-actions {
      display: flex;
      justify-content: space-between;
      border-top: 1px solid var(--glass-border);
      border-bottom: 1px solid var(--glass-border);
      padding: 10px 0;
      margin: 15px 0;
    }

    .action-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 8px;
      transition: 0.2s;
    }

    .action-btn:hover {
      color: var(--accent-neon);
      background: rgba(255, 255, 255, 0.05);
    }

    /* სხვისი და საკუთარი პროფილის პანელი */
    .profile-cover-wrapper {
      position: relative;
      width: 100%;
      height: 220px;
      background: linear-gradient(45deg, #1e1b4b, #311042);
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--glass-border);
    }

    .profile-fb-avatar {
      width: 130px;
      height: 130px;
      border: 5px solid rgba(15, 23, 42, 0.9);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    }

    .profile-fb-name {
      font-size: 28px;
      font-weight: 800;
      color: var(--text-main);
    }

    /* უნიკალური მესინჯერის სისტემა (Messenger Block) */
    #messenger-box {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 360px;
      height: 480px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid var(--accent-neon);
      box-shadow: 0 15px 50px rgba(0,0,0,0.6);
      border-radius: 24px;
      z-index: 1000;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(25px);
    }

    .messenger-header {
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: white;
      font-weight: bold;
    }

    .messenger-messages {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg-bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.4;
    }

    .msg-sent {
      background: #6366f1;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .msg-received {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }

    .messenger-input-row {
      display: flex;
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
      border-top: 1px solid var(--glass-border);
      gap: 10px;
    }

    .messenger-input-row input {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      padding: 10px 14px;
      border-radius: 12px;
      color: white;
      outline: none;
    }
  </style>
</head>
<body>

  <input type="file" id="avatar-file-input" accept="image/*" style="display: none;" onchange="uploadAvatar()">

  <div id="auth-screen">
    <div class="auth-container">
      <div class="logo-glow">Emigrantbook</div>
      <div class="subtitle" id="auth-subtitle" style="color: var(--text-secondary);">შედი პრემიუმ სამყაროში</div>

      <div class="input-group" id="name-group" style="display: none;">
        <label>სახელი და გვარი</label>
        <input type="text" id="fullname" placeholder="გიორგი ბერიძე">
      </div>

      <div class="input-group">
        <label>ელ-ფოსტა</label>
        <input type="email" id="email" placeholder="example@mail.com">
      </div>

      <div class="input-group">
        <label>პაროლი</label>
        <input type="password" id="password" placeholder="******">
      </div>

      <div class="error-msg" id="error-message"></div>

      <button class="btn-neon" id="auth-btn" onclick="handleAuth()">შესვლა</button>

      <div class="toggle-text">
        <span id="toggle-link" onclick="toggleAuthMode()" style="color: var(--accent-neon);">არ გაქვს ანგარიში? დარეგისტრირდი</span>
      </div>
    </div>
  </div>

  <div id="home-screen">
    <div class="header">
      <div class="logo-text" onclick="showScreen('home')">Emigrantbook</div>
      <div class="header-right">
        <div class="header-avatar" id="header-avatar-btn" onclick="showMyProfile()">?</div>
      </div>
    </div>

    <div class="feed-container">
      <div class="glass-card create-post-card">
        <textarea class="create-post-input" id="post-text-input" placeholder="გაუზიარე რამე ახალი ემიგრანტებს..."></textarea>
        
        <div class="file-upload-wrapper">
          <div class="file-upload-btn">📷 აირჩიე მედია ფაილები</div>
          <input type="file" id="post-media-file" accept="image/*,video/*" multiple onchange="showSelectedFileName()">
          <div class="selected-file-info" id="selected-file-name"></div>
        </div>

        <div class="create-post-actions">
          <button class="publish-btn btn-neon" style="width: auto; padding: 10px 24px;" id="publish-submit-btn" onclick="createPost()">გამოქვეყნება</button>
        </div>
      </div>

      <div id="posts-wall">
        <div style="text-align: center; padding: 20px; color: var(--text-secondary);">პოსტები იტვირთება...</div>
      </div>
    </div>
  </div>

  <div id="profile-screen">
    <div class="header">
      <div class="logo-text" onclick="showScreen('home')">← კედელზე დაბრუნება</div>
    </div>
    
    <div class="feed-container">
      <div class="glass-card facebook-profile-container">
        
        <div class="profile-cover-wrapper">
          <button class="cover-camera-btn" id="cover-camera-btn" style="position: absolute; right: 15px; bottom: 15px; background: rgba(0,0,0,0.5); border: none; color: white; padding: 8px; border-radius: 50%;">📷</button>
        </div>

        <div class="profile-info-wrapper" style="display: flex; flex-direction: column; align-items: center; margin-top: -65px;">
          <div class="profile-avatar-holder" style="position: relative;">
            <div class="profile-fb-avatar" id="profile-big-avatar">?</div>
            <button class="avatar-camera-btn" id="avatar-camera-btn" onclick="triggerAvatarUpload()">📷</button>
          </div>
          
          <div class="profile-user-headline" style="text-align: center; margin-top: 15px;">
            <div class="profile-fb-name" id="profile-user-name">იტვირთება...</div>
            <div class="profile-fb-email" id="profile-user-email" style="color: var(--text-secondary);">...</div>
          </div>

          <div style="display: flex; gap: 30px; margin: 15px 0;" id="follower-stats-row">
            <div><strong>254</strong> <span style="color:var(--text-secondary);">მიმდევარი</span></div>
            <div><strong>120</strong> <span style="color:var(--text-secondary);">ფოლოვინგი</span></div>
          </div>

          <div class="profile-action-row" id="profile-action-panel" style="width: 100%;">
            </div>
        </div>

        <div class="profile-details-box" id="profile-details-container" style="margin-top: 20px; border-top: 1px solid var(--glass-border); padding-top: 20px;">
          </div>

        <div class="profile-tabs" style="margin-top: 20px;">
          <button class="tab-button active">პოსტები</button>
          <button class="tab-button">მედია</button>
        </div>

        <div class="profile-logout-section" id="profile-logout-section">
          <button class="btn-neon" style="background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%); margin-top: 20px;" onclick="logout()">სისტემიდან გამოსვლა</button>
        </div>

      </div>
    </div>
  </div>

  <div id="edit-profile-screen">
    <div class="header">
      <div class="logo-text" onclick="showScreen('profile')">← პროფილზე დაბრუნება</div>
    </div>

    <div class="feed-container">
      <div class="glass-card edit-profile-card">
        <div class="edit-header">✏️ პროფილის პერსონალიზაცია</div>

        <div class="input-group">
          <label>სახელი და გვარი</label>
          <input type="text" id="edit-fullname">
        </div>

        <div class="input-group">
          <label>ასაკი</label>
          <input type="number" id="edit-age">
        </div>

        <div class="input-group">
          <label>სამუშაო ადგილი</label>
          <input type="text" id="edit-job">
        </div>

        <div class="input-group">
          <label>ამჟამინდელი ქალაქი</label>
          <input type="text" id="edit-city">
        </div>

        <div class="input-group">
          <label>ქვეყანა</label>
          <input type="text" id="edit-country">
        </div>

        <div class="input-group">
          <label>ურთიერთობის სტატუსი</label>
          <select id="edit-relationship">
            <option value="">აირჩიეთ სტატუსი</option>
            <option value="დასაოჯახებელი">დასაოჯახებელი</option>
            <option value="ურთიერთობაშია">ურთიერთობაშია</option>
            <option value="დაოჯახებულია">დაოჯახებულია</option>
          </select>
        </div>

        <div class="input-group">
          <label>ცხოვრებისეული მოვლენები (Life Events)</label>
          <textarea id="edit-events"></textarea>
        </div>

        <div class="edit-buttons-wrapper">
          <button class="btn-neon" onclick="saveProfileChanges()">ცვლილებების შენახვა</button>
          <button class="btn-neon btn-cancel" style="background: rgba(255,255,255,0.05);" onclick="showScreen('profile')">გაუქმება</button>
        </div>
      </div>
    </div>
  </div>

  <div id="messenger-box">
    <div class="messenger-header">
      <span id="chat-user-name">ჩატი</span>
      <span style="cursor: pointer; font-size: 20px;" onclick="closeMessenger()">×</span>
    </div>
    <div class="messenger-messages" id="chat-messages-area">
      </div>
    <div class="messenger-input-row">
      <input type="text" id="chat-input-text" placeholder="ჩაწერე შეტყობინება..." onkeypress="handleChatKeyPress(event)">
      <button class="btn-neon" style="width: auto; padding: 10px 18px;" onclick="sendChatMessage()">გაგზავნა</button>
    </div>
  </div>

  <script>
    var SUPABASE_URL = "https://mohkxmwphwywkqkoairj.supabase.co"; 
    var SUPABASE_ANON_KEY = "sb_publishable_YSbnMz9ZTafeFUCVp7vR7g_-cnNVKzx"; 
    var supabase;
    var currentUser = null;
    var userProfile = null;
    var activeChatUserId = null;
    var cachedProfiles = {};

    try {
      if (window.supabase && window.supabase.createClient) {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        checkSession();
      }
    } catch (e) {
      alert("კავშირის შეცდომა: " + e.message);
    }

    function checkSession() {
      supabase.auth.getUser().then(function(res) {
        if (res.data && res.data.user) {
          currentUser = res.data.user;
          supabase.from('profiles').select('*').eq('id', currentUser.id).single().then(function(profileRes) {
            var finalName = currentUser.email;
            var avatarUrl = null;
            if (profileRes.data) {
              userProfile = profileRes.data;
              finalName = userProfile.full_name;
              avatarUrl = userProfile.avatar_url;
            }
            renderAvatar('header-avatar-btn', avatarUrl, finalName);
            renderAvatar('profile-big-avatar', avatarUrl, finalName);
            document.getElementById('profile-user-name').innerText = finalName;
            document.getElementById('profile-user-email').innerText = currentUser.email;
            showScreen('home');
          });
        } else {
          showScreen('auth');
        }
      });
    }

    function showScreen(screenName) {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('home-screen').style.display = 'none';
      document.getElementById('profile-screen').style.display = 'none';
      document.getElementById('edit-profile-screen').style.display = 'none';

      if (screenName === 'auth') {
        document.getElementById('auth-screen').style.display = 'flex';
      } else if (screenName === 'home') {
        document.getElementById('home-screen').style.display = 'block';
        loadPosts();
      } else if (screenName === 'profile') {
        document.getElementById('profile-screen').style.display = 'block';
      } else if (screenName === 'edit-profile') {
        document.getElementById('edit-profile-screen').style.display = 'block';
      }
    }

    function renderAvatar(elementId, avatarUrl, name) {
      var el = document.getElementById(elementId);
      if (!el) return;
      if (avatarUrl) {
        el.innerHTML = `<img src="${avatarUrl}" alt="Avatar" style="width:100%; height:100%; object-fit:cover;">`;
      } else {
        var firstLetter = name ? name.charAt(0).toUpperCase() : "?";
        el.innerHTML = "";
        el.innerText = firstLetter;
      }
    }

    // მიმდევრის ფუნქცია (Follow)
    function toggleFollow(authorId) {
      var followBtn = document.getElementById('follow-btn-element');
      if (followBtn.innerText.includes('მიმდინარეობს')) {
        followBtn.innerHTML = '👤 მიყევი';
        followBtn.style.background = 'rgba(255,255,255,0.05)';
      } else {
        followBtn.innerHTML = '✨ მიმდინარეობს';
        followBtn.style.background = 'var(--accent-neon)';
      }
    }

    // მესინჯერის ჩართვა
    function openMessenger(userId, userName) {
      activeChatUserId = userId;
      document.getElementById('chat-user-name').innerText = userName;
      document.getElementById('messenger-box').style.display = 'flex';
      document.getElementById('chat-messages-area').innerHTML = `
        <div class="msg-bubble msg-received">გამარჯობა! მოხარული ვარ შენი გაცნობით ემიგრანტბუქზე. 👋</div>
      `;
    }

    function closeMessenger() {
      document.getElementById('messenger-box').style.display = 'none';
    }

    function sendChatMessage() {
      var text = document.getElementById('chat-input-text').value.trim();
      if (!text) return;

      var container = document.getElementById('chat-messages-area');
      container.innerHTML += `<div class="msg-bubble msg-sent">${text}</div>`;
      document.getElementById('chat-input-text').value = '';
      container.scrollTop = container.scrollHeight;
    }

    function handleChatKeyPress(event) {
      if (event.key === 'Enter') {
        sendChatMessage();
      }
    }

    function renderProfileDetails(profileData) {
      var container = document.getElementById('profile-details-container');
      if (!container) return;

      var ageHtml = profileData.age ? `
        <div class="detail-item"><span class="icon">🎂</span> ასაკი: <strong>${profileData.age} წლის</strong></div>` : '';
      var jobHtml = profileData.job_title ? `
        <div class="detail-item"><span class="icon">💼</span> სამუშაო ადგილი: <strong>${profileData.job_title}</strong></div>` : '';
      var cityHtml = profileData.current_city ? `
        <div class="detail-item"><span class="icon">🏠</span> ცხოვრობს: <strong>${profileData.current_city}</strong></div>` : '';
      var countryHtml = profileData.country ? `
        <div class="detail-item"><span class="icon">📍</span> წარმოშობით: <strong>${profileData.country}</strong></div>` : '';
      var relHtml = profileData.relationship ? `
        <div class="detail-item"><span class="icon">❤️</span> ურთიერთობა: <strong>${profileData.relationship}</strong></div>` : '';
      var eventHtml = profileData.life_events ? `
        <div class="detail-item"><span class="icon">✨</span> მოვლენა: <strong>${profileData.life_events}</strong></div>` : '';

      container.innerHTML = ageHtml + jobHtml + cityHtml + countryHtml + relHtml + eventHtml;
    }

    function showMyProfile() {
      supabase.from('profiles').select('*').eq('id', currentUser.id).single().then(function(profileRes) {
        if (profileRes.data) userProfile = profileRes.data;
        var finalName = userProfile ? userProfile.full_name : currentUser.email;
        var avatarUrl = userProfile ? userProfile.avatar_url : null;
        
        renderAvatar('profile-big-avatar', avatarUrl, finalName);
        document.getElementById('profile-user-name').innerText = finalName;
        document.getElementById('profile-user-email').innerText = currentUser.email;

        document.getElementById('profile-action-panel').innerHTML = `
          <button class="btn-neon" onclick="showEditProfileScreen()">✏️ პროფილის მართვა</button>
        `;
        renderProfileDetails(userProfile || {});
        showScreen('profile');
      });
    }

    function viewUserProfile(userId) {
      if (userId === currentUser.id) {
        showMyProfile();
        return;
      }

      supabase.from('profiles').select('*').eq('id', userId).single().then(function(res) {
        if (res.error || !res.data) return;
        var selectedUser = res.data;
        var finalName = selectedUser.full_name || "მომხმარებელი";

        renderAvatar('profile-big-avatar', selectedUser.avatar_url, finalName);
        document.getElementById('profile-user-name').innerText = finalName;
        document.getElementById('profile-user-email').innerText = "";

        document.getElementById('profile-action-panel').innerHTML = `
          <div style="display:flex; gap:10px; width:100%;">
            <button class="btn-neon" id="follow-btn-element" onclick="toggleFollow('${userId}')">👤 მიყევი</button>
            <button class="btn-neon" style="background:#4f46e5;" onclick="openMessenger('${userId}', '${finalName}')">💬 მიწერე</button>
          </div>
        `;
        renderProfileDetails(selectedUser);
        showScreen('profile');
      });
    }

    function showEditProfileScreen() {
      if (!userProfile) return;
      document.getElementById('edit-fullname').value = userProfile.full_name || "";
      document.getElementById('edit-age').value = userProfile.age || "";
      document.getElementById('edit-job').value = userProfile.job_title || "";
      document.getElementById('edit-city').value = userProfile.current_city || "";
      document.getElementById('edit-country').value = userProfile.country || "";
      document.getElementById('edit-relationship').value = userProfile.relationship || "";
      document.getElementById('edit-events').value = userProfile.life_events || "";
      showScreen('edit-profile');
    }

    function saveProfileChanges() {
      var updateData = {
        full_name: document.getElementById('edit-fullname').value.trim(),
        age: document.getElementById('edit-age').value.trim(),
        job_title: document.getElementById('edit-job').value.trim(),
        current_city: document.getElementById('edit-city').value.trim(),
        country: document.getElementById('edit-country').value.trim(),
        relationship: document.getElementById('edit-relationship').value,
        life_events: document.getElementById('edit-events').value.trim(),
        updated_at: new Date().toISOString()
      };

      supabase.from('profiles').update(updateData).eq('id', currentUser.id).then(function(res) {
        if (!res.error) {
          alert("პროფილი განახლდა!");
          checkSession();
        }
      });
    }

    function loadPosts() {
      supabase.from('posts').select('*').order('created_at', { ascending: false }).then(function(res) {
        var postsWall = document.getElementById('posts-wall');
        postsWall.innerHTML = "";
        if (res.data) {
          supabase.from('profiles').select('id, avatar_url').then(function(profilesRes) {
            if (profilesRes.data) {
              profilesRes.data.forEach(function(p) { cachedProfiles[p.id] = p.avatar_url; });
            }
            res.data.forEach(function(post) { postsWall.innerHTML += createPostCardHtml(post); });
          });
        }
      });
    }

    function createPostCardHtml(post) {
      var date = new Date(post.created_at).toLocaleDateString("ka-GE");
      var initial = post.author_name ? post.author_name.charAt(0).toUpperCase() : "?";
      var authorAvatarUrl = cachedProfiles[post.user_id] || null;
      var avatarContent = authorAvatarUrl ? `<img src="${authorAvatarUrl}" alt="Avatar" style="width:100%; height:100%; object-fit:cover;">` : initial;

      return `
        <div class="glass-card post-card">
          <div class="post-header">
            <div class="post-avatar" onclick="viewUserProfile('${post.user_id}')">${avatarContent}</div>
            <div class="post-author-info">
              <span class="post-author" onclick="viewUserProfile('${post.user_id}')">${post.author_name}</span>
              <div class="post-time">${date}</div>
            </div>
          </div>
          <div class="post-content">${post.content || ""}</div>
          <div class="post-actions">
            <button class="action-btn" onclick="likePost('${post.id}', ${post.likes_count || 0})">👍 ${post.likes_count || 0} მოწონება</button>
            <button class="action-btn" onclick="openMessenger('${post.user_id}', '${post.author_name}')">💬 მიწერე</button>
          </div>
        </div>
      `;
    }

    // სხვა ფუნქციონალები უცვლელია... (ატვირთვა, შესვლა/რეგისტრაცია)
    function toggleAuthMode() {
      var isLogin = document.getElementById('auth-subtitle').innerText.includes('შედი');
      document.getElementById('auth-subtitle').innerText = isLogin ? "შექმენი ახალი ანგარიში" : "შედი პრემიუმ სამყაროში";
      document.getElementById('auth-btn').innerText = isLogin ? "რეგისტრაცია" : "შესვლა";
      document.getElementById('name-group').style.display = isLogin ? 'block' : 'none';
    }

    function handleAuth() {
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value.trim();
      var isLogin = document.getElementById('auth-btn').innerText === "შესვლა";

      if (isLogin) {
        supabase.auth.signInWithPassword({ email: email, password: password }).then(function(res) {
          if (!res.error) checkSession();
        });
      } else {
        var fullName = document.getElementById('fullname').value.trim();
        supabase.auth.signUp({ email: email, password: password }).then(function(res) {
          if (res.data && res.data.user) {
            supabase.from('profiles').insert([{ id: res.data.user.id, full_name: fullName }]).then(function() {
              checkSession();
            });
          }
        });
      }
    }

    function createPost() {
      var text = document.getElementById('post-text-input').value.trim();
      if (!text) return;
      var authorName = userProfile ? userProfile.full_name : currentUser.email;

      supabase.from('posts').insert([{ user_id: currentUser.id, author_name: authorName, content: text }]).then(function() {
        document.getElementById('post-text-input').value = "";
        loadPosts();
      });
    }

    function likePost(postId, currentLikes) {
      supabase.from('posts').update({ likes_count: currentLikes + 1 }).eq('id', postId).then(function() {
        loadPosts();
      });
    }

    function triggerAvatarUpload() { document.getElementById('avatar-file-input').click(); }
    function logout() { supabase.auth.signOut().then(function() { location.reload(); }); }
  </script>
</body>
</html>
