                  role: 'user', 
                  presence: Date.now() 
              });
          }).catch(err => alert(err.message));
      } else {
          const email = document.getElementById('uEmail').value.trim();
          const pass = document.getElementById('uPass').value.trim();
          auth.signInWithEmailAndPassword(email, pass).catch(err => alert(err.message));
      }
  }

  function renderTokenFeed() {
      const feed = document.getElementById('main-feed');
      db.ref('posts').limitToLast(15).once('value', snap => {
          const data = snap.val();
          if(!data) return;
          feed.innerHTML = "";
          Object.entries(data).reverse().forEach(([id, post]) => {
              if(!post.media) return;
              const videoUrl = post.media.find(m => m.type === 'video')?.url;
              if(!videoUrl) return;

              const card = document.createElement('div');
              card.className = 'video-card';
              card.innerHTML = `
                  <video src="${videoUrl}" loop playsinline autoplay muted style="width:100%; height:100%; object-fit:cover;"></video>
                  <div style="position:absolute; left:15px; bottom:90px; color:white;">
                      <b>@${post.authorName}</b>
                      <p>${post.text || ''}</p>
                  </div>
              `;
              feed.appendChild(card);
          });
      });
  }
</script>
</body>
</html>
