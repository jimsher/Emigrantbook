<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Clone</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body { margin: 0; background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .navbar { display: flex; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid #262626; position: sticky; top: 0; background: #000; z-index: 10; }
        .logo { font-weight: bold; font-size: 24px; font-style: italic; }
        .container { max-width: 470px; margin: 0 auto; padding-top: 20px; }
        
        /* პოსტის სტილი */
        .post { margin-bottom: 30px; border-bottom: 1px solid #262626; padding-bottom: 15px; }
        .post-header { display: flex; align-items: center; padding: 10px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; margin-right: 10px; background: #333; }
        .post-media { width: 100%; aspect-ratio: 1/1; background: #111; overflow: hidden; }
        .post-media img { width: 100%; height: 100%; object-fit: cover; }
        .post-actions { padding: 10px; font-size: 24px; display: flex; gap: 15px; }
        
        /* ატვირთვის სექცია */
        #create-post { background: #121212; padding: 15px; border-radius: 12px; margin: 20px; text-align: center; }
        input, button { padding: 10px; border-radius: 5px; border: none; margin-top: 5px; }
        button { background: #0095f6; color: white; cursor: pointer; font-weight: bold; }

        
       /* ავტორიზაციისთვის */
        .auth-box { 
    max-width: 350px; margin: 100px auto; padding: 40px; 
    background: #000; border: 1px solid #262626; border-radius: 2px; 
}
.auth-input { 
    width: 100%; padding: 12px; margin-bottom: 10px; 
    background: #121212; border: 1px solid #333; color: white; border-radius: 4px; 
    box-sizing: border-box;
}
.auth-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
.btn-login { background: #0095f6; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
.btn-signup { background: transparent; color: #0095f6; border: 1px solid #0095f6; padding: 10px; border-radius: 4px; cursor: pointer; }
    </style>

    
</head>
<body>

    

    <div id="auth-page" style="display: block;">
    <section id="login-section" class="auth-box">
        <h2 style="text-align: center;">Instagram</h2>
        <input type="email" id="email" placeholder="ელ-ფოსტა" class="auth-input">
        <input type="password" id="password" placeholder="პაროლი" class="auth-input">
        <div class="auth-buttons">
            <button onclick="signIn()" class="btn-login">შესვლა</button>
            <button onclick="showRegisterForm()" class="btn-signup">რეგისტრაცია</button>
        </div>
    </section>

    <section id="register-section" class="auth-box" style="display: none;">
        <h2>რეგისტრაცია</h2>
        <input type="text" id="reg-name" placeholder="სახელი" class="auth-input">
        <input type="text" id="reg-surname" placeholder="გვარი" class="auth-input">
        <input type="text" id="reg-city" placeholder="ქალაქი" class="auth-input">
        <input type="number" id="reg-age" placeholder="ასაკი" class="auth-input">
        <select id="reg-gender" class="auth-input">
            <option value="">სქესი</option>
            <option value="male">კაცი</option>
            <option value="female">ქალი</option>
        </select>
        <input type="email" id="reg-email" placeholder="ელ-ფოსტა" class="auth-input">
        <input type="password" id="reg-pass" placeholder="პაროლი" class="auth-input">
        <input type="password" id="reg-pass-confirm" placeholder="გაიმეორე პაროლი" class="auth-input">
        
        <button onclick="performRegistration()" class="btn-login">დარეგისტრირება</button>
        <button onclick="showLoginForm()" class="btn-signup">უკან</button>
    </section>
</div>


    <div id="main-page" style="display: none;">
     <nav class="navbar">
        <div class="logo">Instagram</div>
        <div class="nav-links">
            <button onclick="showSection('feed')" style="background:none; color:white; border:none; cursor:pointer;">Home</button>
            <button onclick="showSection('profile')" style="background:none; color:white; border:none; cursor:pointer;">Profile</button>
        </div>
    </nav>

        
    <main class="container">
        <section id="create-post">
            <input type="file" id="fileInput" accept="image/*">
            <input type="text" id="captionInput" placeholder="დაწერე აღწერა..." style="width: 90%;">
            <button onclick="uploadPost()">ატვირთვა</button>
        </section>

        <section id="feed" class="feed-container"></section>

        <section id="profile" class="profile-container" style="display:none; text-align:center;">
            <h3>შენი პროფილი</h3>
            <p>აქ გამოჩნდება შენი პოსტები</p>
        </section>
    </main>
    </div>

    <script>
    const SUPABASE_URL = 'https://mohkxmwphwywkqkoairj.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_YSbnMz9ZTafeFUCVp7vR7g_-cnNVKzx';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function loadFeed() {
        const { data: posts, error } = await supabase.from('posts').select('*, profiles(username, avatar_url)').order('created_at', { ascending: false });
        if (error) return console.error(error);
        
        const feed = document.getElementById('feed');
        feed.innerHTML = posts.map(post => `
            <article class="post">
                <header class="post-header">
                    <img src="${post.profiles?.avatar_url || 'https://via.placeholder.com/32'}" class="avatar">
                    <span class="username">${post.profiles?.username || 'user'}</span>
                </header>
                <div class="post-media"><img src="${post.image_url}"></div>
                <div class="post-actions">
                    <span>❤️</span> <span>💬</span> <span>✈️</span>
                </div>
                <div style="padding: 0 10px;"><strong>${post.profiles?.username || ''}</strong> ${post.caption || ''}</div>
            </article>
        `).join('');
    }

    async function uploadPost() {
        const fileInput = document.getElementById('fileInput');
        const file = fileInput.files[0];
        const caption = document.getElementById('captionInput').value;

        if (!file) return alert("ფაილი არ არის არჩეული!");

        const fileExt = file.name.split('.').pop();
        const fileName = `${Date.now()}.${fileExt}`;

        const { data, error } = await supabase.storage.from('posts').upload(fileName, file);

        if (error) {
            console.error("Supabase Storage Error:", error);
            alert("ატვირთვა ვერ მოხერხდა: " + error.message);
            return;
        }

        // პოსტის მონაცემების შენახვა ცხრილში (საჭიროა ატვირთვის შემდეგ)
        const { error: dbError } = await supabase.from('posts').insert([{ image_url: fileName, caption: caption }]);
        
        console.log("ატვირთვა წარმატებით დასრულდა:", data);
        alert("პოსტი წარმატებით აიტვირთა!");
        loadFeed();
    }

    function showSection(id) {
        document.getElementById('feed').style.display = (id === 'feed') ? 'block' : 'none';
        document.getElementById('profile').style.display = (id === 'profile') ? 'block' : 'none';
    }

    // ავტორიზაცია და შესვლა
    async function signUp() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = await supabase.auth.signUp({ email, password });
        if (error) alert("შეცდომა: " + error.message);
        else alert("რეგისტრაცია წარმატებულია! შეამოწმე ელ-ფოსტა.");
    }

    async function signIn() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        
        if (error) {
            alert("შეცდომა შესვლისას: " + error.message);
        } else {
            alert("წარმატებით შეხვედი!");
            showApp();
            loadFeed();
        }
    }

    function showRegisterForm() {
        document.getElementById('login-section').style.display = 'none';
        document.getElementById('register-section').style.display = 'block';
    }

    function showLoginForm() {
        document.getElementById('login-section').style.display = 'block';
        document.getElementById('register-section').style.display = 'none';
    }

    async function performRegistration() {
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-pass').value;
        const confirmPassword = document.getElementById('reg-pass-confirm').value;

        if (password !== confirmPassword) {
            alert("პაროლები არ ემთხვევა!");
            return;
        }

        const { data, error } = await supabase.auth.signUp({ email, password });
        
        if (error) {
            alert("შეცდომა: " + error.message);
        } else {
            alert("რეგისტრაცია წარმატებულია!");
            showLoginForm();
        }
    }

    function showApp() {
        document.getElementById('auth-box').style.display = 'none';
        document.getElementById('main-page').style.display = 'block';
    }

    // შემოწმება გვერდის ჩატვირთვისას
    supabase.auth.onAuthStateChange((event, session) => {
        if (session) showApp();
    });

    loadFeed();
</script>
    

    <script>
    // 1. Supabase კონფიგურაცია და ინიციალიზაცია (აქ რჩება)
    
    // 2. ავტორიზაციის ფუნქციები
    async function signUp() { ... }
    async function signIn() { ... }

    // 3. დარჩენილი ფუნქციები (loadFeed და ა.შ.)
</script>
</body>
</html>
