<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emigrantbook - ავტორიზაცია</title>

  <script>
  // ეს კოდი დაიჭერს ნებისმიერ შეცდომას და ეკრანზე გამოგიტანს
  window.onerror = function(message, source, lineno, colno, error) {
    alert("შეცდომაა!: " + message + "\nფაილი: " + source + "\nხაზი: " + lineno);
    return false;
  };
</script>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    body {
      background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .auth-container {
      background: rgba(255, 255, 255, 0.95);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .logo {
      font-size: 28px;
      font-weight: bold;
      color: #1e3c72;
      margin-bottom: 10px;
    }
    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 25px;
    }
    .input-group {
      margin-bottom: 15px;
      text-align: left;
    }
    .input-group label {
      display: block;
      font-size: 12px;
      color: #333;
      margin-bottom: 5px;
      font-weight: 600;
    }
    .input-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: 0.3s;
    }
    .input-group input:focus {
      border-color: #1e3c72;
    }
    .btn {
      width: 100%;
      padding: 12px;
      background: #1e3c72;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }
    .btn:hover {
      background: #2a5298;
    }
    .toggle-text {
      margin-top: 20px;
      font-size: 14px;
      color: #555;
    }
    .toggle-text span {
      color: #1e3c72;
      cursor: pointer;
      font-weight: bold;
      text-decoration: underline;
    }
    .error-msg {
      color: #d9534f;
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="logo">Emigrantbook</div>
    <div class="subtitle" id="auth-subtitle">შედი შენს პროფილში</div>

    <div class="input-group" id="name-group" style="display: none;">
      <label>სახელი და გვარი</label>
      <input type="text" id="fullname" placeholder="გიორგი ბერიძე">
    </div>

    <div class="input-group">
      <label>ელ-ფოსტა</label>
      <input type="email" id="email" placeholder="example@mail.com">
    </div>

    <div class="input-group">
      <label>პაროლი</label>
      <input type="password" id="password" placeholder="******">
    </div>

    <div class="error-msg" id="error-message"></div>

    <button class="btn" id="auth-btn" onclick="handleAuth()">შესვლა</button>

    <div class="toggle-text">
      <span id="toggle-link" onclick="toggleAuthMode()">არ გაქვს ანგარიში? დარეგისტრირდი</span>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://mohkxmwphwywkqkoairj.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_YSbnMz9ZTafeFUCVp7vR7g_-cnNVKzx"; 
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let isLoginMode = true;

    // ფუნქცია, რომელიც გადართავს შესვლასა და რეგისტრაციას შორის
    function toggleAuthMode() {
      isLoginMode = !isLoginMode;
      const subtitle = document.getElementById('auth-subtitle');
      const btn = document.getElementById('auth-btn');
      const toggleLink = document.getElementById('toggle-link');
      const errorDiv = document.getElementById('error-message');
      const nameGroup = document.getElementById('name-group');
      
      errorDiv.style.display = 'none';

      if (isLoginMode) {
        subtitle.innerText = "შედი შენს პროფილში";
        btn.innerText = "შესვლა";
        toggleLink.innerText = "არ გაქვს ანგარიში? დარეგისტრირდი";
        nameGroup.style.display = 'none'; // ვმალავთ სახელის ველს
      } else {
        subtitle.innerText = "შექმენი ახალი ანგარიში";
        btn.innerText = "რეგისტრაცია";
        toggleLink.innerText = "უკვე გაქვს ანგარიში? შედი";
        nameGroup.style.display = 'block'; // ვაჩენთ სახელის ველს
      }
    }

    // ავტორიზაციის და რეგისტრაციის დამუშავება
    async function handleAuth() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      const fullname = document.getElementById('fullname').value.trim();
      const errorDiv = document.getElementById('error-message');

      errorDiv.style.display = 'none';

      // შემოწმება, რომ ველები ცარიელი არ იყოს
      if (!email || !password || (!isLoginMode && !fullname)) {
        errorDiv.innerText = "გთხოვთ შეავსოთ ყველა ველი!";
        errorDiv.style.display = 'block';
        return;
      }

      if (isLoginMode) {
        // --- შესვლა ---
        const { data, error } = await supabase.auth.signInWithPassword({
          email: email,
          password: password,
        });

        if (error) {
          errorDiv.innerText = "შეცდომა: " + error.message;
          errorDiv.style.display = 'block';
        } else {
          alert("წარმატებით შეხვედი!");
          window.location.href = "home.html"; 
        }
      } else {
        // --- რეგისტრაცია ---
        const { data, error } = await supabase.auth.signUp({
          email: email,
          password: password,
        });

        if (error) {
          errorDiv.innerText = "შეცდომა: " + error.message;
          errorDiv.style.display = 'block';
          return;
        }

        // თუ მომხმარებელი წარმატებით შეიქმნა, სახელს ვწერთ 'profiles' ცხრილში
        if (data && data.user) {
          const { error: profileError } = await supabase
            .from('profiles')
            .insert([
              { 
                id: data.user.id, 
                full_name: fullname,
                updated_at: new Date()
              }
            ]);

          if (profileError) {
            console.error("პროფილის შექმნის შეცდომა:", profileError.message);
          }
        }

        alert("რეგისტრაცია წარმატებით დასრულდა! გთხოვთ შეამოწმოთ თქვენი ელ-ფოსტა აქტივაციისთვის.");
      }
    }
  </script>
</body>
</html>
