<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, minimum-scale=1.0">
  <title>Emigrantbook</title>
  
  <script>
    // შეცდომის დამჭერი
    window.onerror = function(message, source, lineno, colno, error) {
      alert("აპლიკაციის შეცდომა!: " + message + "\nხაზი: " + lineno);
      return false;
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8/dist/umd/supabase.js"></script>
  
  <style>
    /* უნიკალური ფუტურისტული ფერების პალიტრა */
    :root {
      --bg-space: radial-gradient(circle at 50% 50%, #0d0b21 0%, #05050d 100%);
      --glass-panel: rgba(13, 11, 33, 0.65);
      --glass-border: rgba(99, 102, 241, 0.2);
      --glass-glow: 0 8px 32px 0 rgba(99, 102, 241, 0.15);
      
      --neon-pink: #f43f5e;
      --neon-cyan: #06b6d4;
      --neon-indigo: #6366f1;
      
      --text-main: #f8fafc;
      --text-glow: #e2e8f0;
      --text-dim: #64748b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
    }

    body {
      background: var(--bg-space);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ულამაზესი ხაზობრივი გადასვლების ეფექტი */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(0, 0, 0, 0.3);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--neon-indigo);
      border-radius: 10px;
    }

    /* 1. ავტორიზაციის ეკრანი */
    #auth-screen {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: radial-gradient(circle at top left, rgba(244, 63, 94, 0.15), transparent 40%),
                  radial-gradient(circle at bottom right, rgba(6, 182, 212, 0.15), transparent 40%);
    }

    .auth-container {
      background: var(--glass-panel);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border);
      padding: 45px 35px;
      border-radius: 30px;
      box-shadow: var(--glass-glow), 0 20px 40px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 420px;
      text-align: center;
      position: relative;
    }

    .auth-container::before {
      content: '';
      position: absolute;
      top: -2px; left: -2px; right: -2px; bottom: -2px;
      background: linear-gradient(135deg, var(--neon-pink), var(--neon-indigo), var(--neon-cyan));
      border-radius: 32px;
      z-index: -1;
      opacity: 0.3;
    }

    .logo {
      font-size: 38px;
      font-weight: 950;
      background: linear-gradient(to right, #ffffff, var(--neon-cyan), var(--neon-indigo));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 5px;
      letter-spacing: -1.5px;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 13px;
      margin-bottom: 35px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .input-group {
      margin-bottom: 22px;
      text-align: left;
    }

    .input-group label {
      display: block;
      font-size: 11px;
      color: var(--neon-cyan);
      margin-bottom: 8px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .input-group input, .input-group select, .input-group textarea {
      width: 100%;
      padding: 15px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(0, 0, 0, 0.4);
      border-radius: 14px;
      font-size: 14px;
      color: #fff;
      outline: none;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.3), inset 0 2px 4px rgba(0,0,0,0.5);
      background: rgba(0, 0, 0, 0.6);
    }

    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--neon-pink) 0%, var(--neon-indigo) 50%, var(--neon-cyan) 100%);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(244, 63, 94, 0.6);
      filter: brightness(1.1);
    }

    .toggle-text {
      margin-top: 25px;
      font-size: 13px;
      color: var(--text-dim);
    }

    .toggle-text span {
      color: var(--neon-cyan);
      cursor: pointer;
      font-weight: 700;
    }

    .toggle-text span:hover {
      text-decoration: underline;
    }

    .error-msg {
      color: var(--neon-pink);
      background: rgba(244, 63, 94, 0.1);
      border: 1px solid rgba(244, 63, 94, 0.2);
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    /* 2. მთავარი კედლის და პროფილის სტილები */
    #home-screen, #profile-screen, #edit-profile-screen {
      display: none;
    }

    .header {
      background: rgba(13, 11, 33, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header .logo-text {
      font-size: 26px;
      font-weight: 950;
      background: linear-gradient(135deg, #fff 30%, var(--neon-cyan) 70%, var(--neon-indigo) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
      cursor: pointer;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .header-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid var(--neon-indigo);
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(99, 102, 241, 0.3);
      transition: all 0.3s ease;
    }

    .header-avatar:hover {
      transform: scale(1.1) rotate(5deg);
      border-color: var(--neon-cyan);
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.5);
    }

    .header-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .feed-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 24px 12px;
    }

    /* პრემიუმ ნეო ბარათები */
    .premium-card {
      background: var(--glass-panel);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: var(--glass-glow);
      position: relative;
    }

    .create-post-card {
      background: linear-gradient(135deg, rgba(13, 11, 33, 0.8) 0%, rgba(99, 102, 241, 0.05) 100%);
    }

    .create-post-input {
      width: 100%;
      height: 80px;
      border: none;
      resize: none;
      outline: none;
      font-size: 16px;
      background: transparent;
      color: var(--text-main);
      margin-bottom: 15px;
    }

    .file-upload-wrapper {
      position: relative;
      margin-bottom: 15px;
    }

    .file-upload-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background-color: rgba(255, 255, 255, 0.02);
      color: var(--neon-cyan);
      padding: 14px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      border: 1px dashed var(--glass-border);
      width: 100%;
      transition: all 0.3s ease;
    }

    .file-upload-btn:hover {
      background-color: rgba(6, 182, 212, 0.05);
      border-color: var(--neon-cyan);
    }

    .selected-file-info {
      font-size: 13px;
      color: var(--neon-pink);
      margin-top: 8px;
      font-weight: bold;
    }

    .create-post-actions {
      display: flex;
      justify-content: flex-end;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 15px;
    }

    .publish-btn {
      background: linear-gradient(135deg, var(--neon-indigo) 0%, var(--neon-cyan) 100%);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 12px;
      font-weight: 800;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
      transition: all 0.3s ease;
    }

    .publish-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(6, 182, 212, 0.5);
    }

    /* პოსტის ბარათის Neo სტილი */
    .post-card {
      transition: all 0.3s ease;
    }

    .post-card:hover {
      border-color: rgba(6, 182, 212, 0.4);
      box-shadow: 0 12px 40px rgba(6, 182, 212, 0.15);
    }

    .post-header {
      display: flex;
      align-items: center;
      padding-bottom: 15px;
    }

    .post-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background-color: var(--neon-indigo);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 16px;
      margin-right: 15px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid var(--neon-indigo);
    }

    .post-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .post-author-info {
      display: flex;
      flex-direction: column;
    }

    .post-author {
      font-weight: bold;
      font-size: 16px;
      color: white;
      cursor: pointer;
      transition: color 0.2s ease;
    }

    .post-author:hover {
      color: var(--neon-cyan);
    }

    .post-time {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .post-content {
      font-size: 15px;
      line-height: 1.6;
      color: #e2e8f0;
      padding-bottom: 15px;
    }

    .post-media {
      width: 100%;
      max-height: 450px;
      object-fit: cover;
      display: block;
      border-radius: 16px;
      margin-bottom: 15px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* კოლაჟი */
    .collage-container {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 15px;
    }

    .collage-grid {
      display: grid;
      gap: 4px;
      background-color: rgba(255, 255, 255, 0.05);
    }

    .collage-item {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .collage-1 { grid-template-columns: 1fr; height: 350px; }
    .collage-2 { grid-template-columns: 1fr 1fr; height: 250px; }
    .collage-3 { grid-template-columns: 1fr 1fr; grid-template-rows: 125px 125px; height: 250px; }
    .collage-3 *:first-child { grid-row: span 2; }
    .collage-4 { grid-template-columns: 2fr 1fr; grid-template-rows: 83px 83px 83px; height: 250px; }
    .collage-4 *:first-child { grid-row: span 3; }
    .collage-5 { grid-template-columns: 1fr 1fr; grid-template-rows: 150px 100px 100px; height: 350px; }
    .collage-5 *:first-child { grid-column: span 2; }
    .collage-6 { grid-template-columns: repeat(3, 1fr); grid-template-rows: 180px 100px; height: 280px; }
    .collage-6 *:first-child { grid-column: span 2; }

    /* ლაიქები და კომენტარები */
    .post-stats {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-dim);
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .post-actions {
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .action-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: 10px;
      transition: all 0.3s ease;
    }

    .action-btn:hover {
      background-color: rgba(99, 102, 241, 0.1);
      color: var(--neon-cyan);
    }

    .comment-box-area {
      display: flex;
      align-items: center;
      padding-top: 15px;
      gap: 12px;
    }

    .comment-box-avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      overflow: hidden;
    }

    .comment-box-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .comment-input-container {
      flex: 1;
      display: flex;
      background-color: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 10px 18px;
      align-items: center;
    }

    .comment-input-container input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      font-size: 14px;
      color: white;
    }

    .comment-submit-button {
      background: none;
      border: none;
      color: var(--neon-cyan);
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
    }

    /* --------------------------------------
        ულამაზესი პროფილის განლაგება (Grid Layout)
     -------------------------------------- */
    .facebook-profile-container {
      width: 100%;
    }

    /* ქავერი პანორამული რკალით */
    .profile-cover-wrapper {
      position: relative;
      width: 100%;
      height: 240px;
      background: linear-gradient(135deg, #1e1b4b 0%, #311042 50%, #0d0b21 100%);
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--glass-border);
    }

    .cover-camera-btn {
      position: absolute;
      right: 20px;
      bottom: 20px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background-color: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      border: 1px solid var(--glass-border);
    }

    /* პროფილის ინფორმაცია */
    .profile-info-wrapper {
      position: relative;
      padding: 0 24px 24px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-top: -75px;
    }

    .profile-avatar-holder {
      position: relative;
      width: 150px;
      height: 150px;
    }

    /* ორმაგი ნეონის მცურავი ავატარი */
    .profile-fb-avatar {
      width: 150px;
      height: 150px;
      border-radius: 50%;
      background-color: #0d0b21;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 50px;
      font-weight: 900;
      border: 4px solid var(--neon-cyan);
      text-transform: uppercase;
      box-shadow: 0 0 30px rgba(6, 182, 212, 0.4);
      overflow: hidden;
    }

    .profile-fb-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .avatar-camera-btn {
      position: absolute;
      right: 5px;
      bottom: 5px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-color: var(--neon-pink);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 3px solid #0d0b21;
      cursor: pointer;
    }

    .profile-user-headline {
      margin-top: 20px;
    }

    .profile-fb-name {
      font-size: 30px;
      font-weight: 950;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, white, #fff, var(--neon-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .profile-fb-email {
      font-size: 14px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* ულამაზესი Follow & მესიჯის პანელი */
    .profile-action-row {
      display: flex;
      width: 100%;
      gap: 12px;
      margin-top: 25px;
    }

    .btn-add-story {
      flex: 1;
      background: linear-gradient(135deg, var(--neon-pink) 0%, var(--neon-indigo) 100%);
      color: #ffffff;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .btn-edit-profile {
      flex: 1;
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      color: white;
      border-radius: 14px;
      padding: 14px;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .btn-more-options {
      width: 54px;
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      color: white;
      border-radius: 14px;
      cursor: pointer;
      font-size: 18px;
    }

    /* დეტალების ბლოკები (Neo-Grid Cards) */
    .profile-details-box {
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding: 24px 0;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
    }

    .detail-item {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      padding: 16px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 8px;
    }

    .detail-item span.icon {
      font-size: 24px;
      color: var(--neon-cyan);
    }

    .detail-item span {
      font-size: 12px;
      color: var(--text-dim);
    }

    .detail-item strong {
      font-weight: 700;
      color: white;
      font-size: 14px;
    }

    /* მენიუს ჩანართები */
    .profile-tabs {
      display: flex;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding: 12px 0;
      gap: 12px;
    }

    .tab-button {
      background: none;
      border: none;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: bold;
      color: var(--text-dim);
      cursor: pointer;
      border-radius: 12px;
    }

    .tab-button.active {
      background-color: rgba(6, 182, 212, 0.1);
      color: var(--neon-cyan);
    }

    /* პროფილის ქვედა ნაცრისფერი ზოლი */
    .profile-logout-section {
      padding: 24px 0 0 0;
    }

    .logout-btn-large {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--neon-pink) 0%, #be123c 100%);
      color: white;
      border: none;
      border-radius: 14px;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
    }

    /* 3. პროფილის რედაქტირების გვერდის სტილები */
    .edit-profile-card {
      padding: 30px;
    }

    .edit-header {
      font-size: 24px;
      font-weight: 900;
      color: white;
      margin-bottom: 25px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 15px;
    }

    .edit-buttons-wrapper {
      display: flex;
      gap: 12px;
      margin-top: 30px;
    }

    .btn-save {
      background: linear-gradient(135deg, var(--neon-indigo) 0%, var(--neon-cyan) 100%);
      color: white;
    }

    .btn-cancel {
      background-color: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--glass-border);
      color: white;
    }
  </style>
</head>
<body>

  <div id="auth-screen">

    <div class="feed-container">

  <div id="profile-screen">

    <div class="feed-container">
      <div class="premium-card facebook-profile-container">
        
        <div class="profile-cover-wrapper">

          <div class="profile-user-headline">

          <div class="profile-action-row" id="profile-action-panel">

  <div id="edit-profile-screen">

    <div class="feed-container">
      <div class="premium-card edit-profile-card">

        <div class="input-group">
          <label>სახელი და გვარი</label>

          <label>ამჟამინდელი ქალაქი</label>

          <label>ურთიერთობის სტატუსი</label>

            <option value="დასაოჯახებელი">დასაოჯახებელი</option>
            <option value="ურთიერთობაშია">ურთიერთობაშია</option>
            <option value="დანიშნულია">დანიშნულია</option>
            <option value="დაოჯახებულია">დაოჯახებულია</option>
            <option value="რთულია">რთულია</option>
          </select>

        <div class="input-group">

          <textarea id="edit-events" placeholder="მაგ. დავიწყე ახალი სამსახური, გადმოვედი ემიგრაციაში..."></textarea>

          <button class="btn btn-save" onclick="saveProfileChanges()">ცვლილებების შენახვა</button>
          <button class="btn btn-cancel" onclick="showScreen('profile')">გაუქმება</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    var SUPABASE_URL = "https://mohkxmwphwywkqkoairj.supabase.co"; 
    var SUPABASE_ANON_KEY = "sb_publishable_YSbnMz9ZTafeFUCVp7vR7g_-cnNVKzx"; 
    var supabase;
    var currentUser = null;
    var userProfile = null;
    var cachedProfiles = {}; // ყველა მომხმარებლის პროფილის ქეში

    var videoObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (!entry.isIntersecting) {
          entry.target.pause();
        }
      });
    }, {
      threshold: 0.1
    });

    function observeVideos() {
      var videos = document.querySelectorAll('video');
      videos.forEach(function(video) {
        videoObserver.observe(video);
      });
    }

    try {
      if (window.supabase && window.supabase.createClient) {
        supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        checkSession();
      } else {
        alert("შეცდომა: Supabase ბიბლიოთეკა ვერ ჩაიტვირთა.");
      }
    } catch (e) {
      alert("კავშირის შეცდომა: " + e.message);
    }

    function showSelectedFileName() {
      var fileInput = document.getElementById('post-media-file');
      var nameDiv = document.getElementById('selected-file-name');
      if (fileInput.files.length > 0) {
        nameDiv.innerText = "📎 მონიშნულია: " + fileInput.files.length + " ფაილი";
        nameDiv.style.display = "block";
      } else {
        nameDiv.style.display = "none";
      }
    }

    function showScreen(screenName) {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('home-screen').style.display = 'none';
      document.getElementById('profile-screen').style.display = 'none';
      document.getElementById('edit-profile-screen').style.display = 'none';

      if (screenName === 'auth') {
        document.getElementById('auth-screen').style.display = 'flex';
      } else if (screenName === 'home') {
        document.getElementById('home-screen').style.display = 'block';
        loadPosts();
      } else if (screenName === 'profile') {
        document.getElementById('profile-screen').style.display = 'block';
      } else if (screenName === 'edit-profile') {
        document.getElementById('edit-profile-screen').style.display = 'block';
      }
    }

    // ავატარის ასახვა
    function renderAvatar(elementId, avatarUrl, name) {
      var el = document.getElementById(elementId);
      if (!el) return;
      
      if (avatarUrl) {
        el.innerHTML = `<img src="${avatarUrl}" alt="Avatar" style="width:100%; height:100%; object-fit:cover;">`;
      } else {
        var firstLetter = name ? name.charAt(0).toUpperCase() : "?";
        el.innerHTML = "";
        el.innerText = firstLetter;
      }
    }

    function checkSession() {
      supabase.auth.getUser().then(function(res) {
        if (res.data && res.data.user) {
          currentUser = res.data.user;
          
          supabase.from('profiles').select('*').eq('id', currentUser.id).single().then(function(profileRes) {
            var finalName = currentUser.email;
            var avatarUrl = null;
            if (profileRes.data) {
              userProfile = profileRes.data;
              finalName = userProfile.full_name;
              avatarUrl = userProfile.avatar_url;
            }
            
            renderAvatar('header-avatar-btn', avatarUrl, finalName);
            renderAvatar('profile-big-avatar', avatarUrl, finalName);
            
            document.getElementById('profile-user-name').innerText = finalName;
            document.getElementById('profile-user-email').innerText = currentUser.email;

            showScreen('home');
          });
        } else {
          showScreen('auth');
        }
      });
    }

    // დეტალების დახატვა პროფილის გვერდზე
    function renderProfileDetails(profileData) {
      var container = document.getElementById('profile-details-container');
      if (!container) return;

      var ageHtml = profileData.age ? `
        <div class="detail-item">
          <span class="icon">🎂</span>
          <span>ასაკი</span>
          <strong>${profileData.age} წლის</strong>
        </div>` : '';

      var jobHtml = profileData.job_title ? `
        <div class="detail-item">
          <span class="icon">💼</span>
          <span>სამუშაო</span>
          <strong>${profileData.job_title}</strong>
        </div>` : `
        <div class="detail-item">
          <span class="icon">💼</span>
          <span>სამუშაო</span>
          <strong>დეველოპერი</strong>
        </div>`;

      var cityHtml = profileData.current_city ? `
        <div class="detail-item">
          <span class="icon">🏠</span>
          <span>ქალაქი</span>
          <strong>${profileData.current_city}</strong>
        </div>` : `
        <div class="detail-item">
          <span class="icon">🏠</span>
          <span>ქალაქი</span>
          <strong>თბილისი</strong>
        </div>`;

      var countryHtml = profileData.country ? `
        <div class="detail-item">
          <span class="icon">📍</span>
          <span>ქვეყანა</span>
          <strong>${profileData.country}</strong>
        </div>` : `
        <div class="detail-item">
          <span class="icon">📍</span>
          <span>ქვეყანა</span>
          <strong>საქართველო</strong>
        </div>`;

      var relHtml = profileData.relationship ? `
        <div class="detail-item">
          <span class="icon">❤️</span>
          <span>სტატუსი</span>
          <strong>${profileData.relationship}</strong>
        </div>` : '';

      var eventHtml = profileData.life_events ? `
        <div class="detail-item">
          <span class="icon">✨</span>
          <span>მოვლენა</span>
          <strong>${profileData.life_events}</strong>
        </div>` : '';

      container.innerHTML = ageHtml + jobHtml + cityHtml + countryHtml + relHtml + eventHtml;
    }

    // საკუთარი პროფილის ჩვენება
    function showMyProfile() {
      if (!currentUser) return;
      
      supabase.from('profiles').select('*').eq('id', currentUser.id).single().then(function(profileRes) {
        if (profileRes.data) {
          userProfile = profileRes.data;
        }

        var finalName = userProfile ? userProfile.full_name : currentUser.email;
        var avatarUrl = userProfile ? userProfile.avatar_url : null;
        
        renderAvatar('profile-big-avatar', avatarUrl, finalName);
        document.getElementById('profile-user-name').innerText = finalName;
        document.getElementById('profile-user-email').innerText = currentUser.email;

        document.getElementById('avatar-camera-btn').style.display = "flex";
        document.getElementById('cover-camera-btn').style.display = "flex";

        document.getElementById('profile-action-panel').innerHTML = `
          <button class="btn-add-story">➕ ისტორიაში დამატება</button>
          <button class="btn-edit-profile" onclick="showEditProfileScreen()">✏️ რედაქტირება</button>
          <button class="btn-more-options">•••</button>
        `;

        document.getElementById('profile-logout-section').style.display = "block";
        
        renderProfileDetails(userProfile || {});
        showScreen('profile');
      });
    }

    // სხვა მომხმარებლის პროფილის ჩვენება
    function viewUserProfile(userId) {
      if (!userId) return;
      if (userId === currentUser.id) {
        showMyProfile();
        return;
      }

      supabase.from('profiles').select('*').eq('id', userId).single().then(function(res) {
        if (res.error || !res.data) {
          alert("მომხმარებლის პროფილი ვერ მოიძებნა.");
          return;
        }

        var selectedUser = res.data;
        var finalName = selectedUser.full_name || "მომხმარებელი";
        var avatarUrl = selectedUser.avatar_url;

        renderAvatar('profile-big-avatar', avatarUrl, finalName);
        document.getElementById('profile-user-name').innerText = finalName;
        document.getElementById('profile-user-email').innerText = ""; 

        document.getElementById('avatar-camera-btn').style.display = "none";
        document.getElementById('cover-camera-btn').style.display = "none";

        document.getElementById('profile-action-panel').innerHTML = `
          <button class="btn-add-story" style="background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-indigo) 100%);">👤 მიყევი</button>
          <button class="btn-edit-profile" style="background-color: var(--neon-pink); border: none;">💬 მიწერე</button>
          <button class="btn-more-options">•••</button>
        `;

        document.getElementById('profile-logout-section').style.display = "none";

        renderProfileDetails(selectedUser);
        showScreen('profile');
      });
    }

    // რედაქტირების გვერდის გახსნა და მონაცემების შევსება
    function showEditProfileScreen() {
      if (!userProfile) return;

      document.getElementById('edit-fullname').value = userProfile.full_name || "";
      document.getElementById('edit-age').value = userProfile.age || "";
      document.getElementById('edit-job').value = userProfile.job_title || "";
      document.getElementById('edit-city').value = userProfile.current_city || "";
      document.getElementById('edit-country').value = userProfile.country || "";
      document.getElementById('edit-relationship').value = userProfile.relationship || "";
      document.getElementById('edit-events').value = userProfile.life_events || "";

      showScreen('edit-profile');
    }

    // ცვლილებების შენახვა
    function saveProfileChanges() {
      var fullName = document.getElementById('edit-fullname').value.trim();
      var age = document.getElementById('edit-age').value.trim();
      var job = document.getElementById('edit-job').value.trim();
      var city = document.getElementById('edit-city').value.trim();
      var country = document.getElementById('edit-country').value.trim();
      var relationship = document.getElementById('edit-relationship').value;
      var events = document.getElementById('edit-events').value.trim();

      if (!fullName) {
        alert("სახელი და გვარის შევსება აუცილებელია!");
        return;
      }

      var updateData = {
        full_name: fullName,
        age: age,
        job_title: job,
        current_city: city,
        country: country,
        relationship: relationship,
        life_events: events,
        updated_at: new Date().toISOString()
      };

      alert("მონაცემები ინახება...");

      supabase.from('profiles')
        .update(updateData)
        .eq('id', currentUser.id)
        .then(function(res) {
          if (res.error) {
            alert("შეცდომა შენახვისას: " + res.error.message);
          } else {
            alert("პროფილი წარმატებით განახლდა!");
            
            supabase.from('profiles').select('*').eq('id', currentUser.id).single().then(function(profileRes) {
              if (profileRes.data) {
                userProfile = profileRes.data;
              }
              showMyProfile();
            });
          }
        });
    }

    function triggerAvatarUpload() {
      document.getElementById('avatar-file-input').click();
    }

    // ავატარის ატვირთვა
    function uploadAvatar() {
      var fileInput = document.getElementById('avatar-file-input');
      if (fileInput.files.length === 0) return;

      var file = fileInput.files[0];
      var fileExt = file.name.split('.').pop();
      var fileName = currentUser.id + "_avatar_" + Date.now() + "." + fileExt;

      alert("სურათი იტვირთება...");

      supabase.storage.from('avatars').upload(fileName, file).then(function(storageRes) {
        if (storageRes.error) {
          alert("ავატარის ატვირთვის შეცდომა: " + storageRes.error.message);
          return;
        }

        var avatarPublicUrl = SUPABASE_URL + "/storage/v1/object/public/avatars/" + fileName;

        supabase.from('profiles')
          .update({ avatar_url: avatarPublicUrl })
          .eq('id', currentUser.id)
          .then(function(updateRes) {
            if (updateRes.error) {
              alert("პროფილის განახლების შეცდომა: " + updateRes.error.message);
            } else {
              alert("პროფილის სურათი წარმატებით განახლდა!");
              checkSession();
            }
          });
      });
    }

    var isLoginMode = true;
    function toggleAuthMode() {
      isLoginMode = !isLoginMode;
      var subtitle = document.getElementById('auth-subtitle');
      var btn = document.getElementById('auth-btn');
      var toggleLink = document.getElementById('toggle-link');
      var errorDiv = document.getElementById('error-message');
      var nameGroup = document.getElementById('name-group');
      
      errorDiv.style.display = 'none';

      if (isLoginMode) {
        subtitle.innerText = "შედი შენს პროფილში";
        btn.innerText = "შესვლა";
        toggleLink.innerText = "არ გაქვს ანგარიში? დარეგისტრირდი";
        nameGroup.style.display = 'none';
      } else {
        subtitle.innerText = "შექმენი ახალი ანგარიში";
        btn.innerText = "რეგისტრაცია";
        toggleLink.innerText = "უკვე გაქვს ანგარიში? შედი";
        nameGroup.style.display = 'block';
      }
    }

    function handleAuth() {
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value.trim();
      var fullname = document.getElementById('fullname').value.trim();
      var errorDiv = document.getElementById('error-message');

      errorDiv.style.display = 'none';

      if (!email || !password || (!isLoginMode && !fullname)) {
        errorDiv.innerText = "გთხოვთ შეავსოთ ყველა ველი!";
        errorDiv.style.display = 'block';
        return;
      }

      if (isLoginMode) {
        supabase.auth.signInWithPassword({
          email: email,
          password: password
        }).then(function(result) {
          if (result.error) {
            errorDiv.innerText = "შეცდომა: " + result.error.message;
            errorDiv.style.display = 'block';
          } else {
            checkSession();
          }
        });
      } else {
        supabase.auth.signUp({
          email: email,
          password: password
        }).then(function(result) {
          if (result.error) {
            errorDiv.innerText = "შეცდომა: " + result.error.message;
            errorDiv.style.display = 'block';
            return;
          }

          if (result.data && result.data.user) {
            supabase.from('profiles').insert([
              { 
                id: result.data.user.id, 
                full_name: fullname,
                updated_at: new Date().toISOString()
              }
            ]).then(function(pRes) {
              alert("რეგისტრაცია წარმატებულია!");
              checkSession();
            });
          }
        });
      }
    }

    // პოსტების უსაფრთხო ჩატვირთვა
    function loadPosts() {
      supabase.from('posts').select('*').order('created_at', { ascending: false }).then(function(res) {
        var postsWall = document.getElementById('posts-wall');
        postsWall.innerHTML = "";

        if (res.error) {
          postsWall.innerHTML = '<div style="color:red; text-align:center;">პოსტები ვერ ჩაიტვირთა: ' + res.error.message + '</div>';
          return;
        }

        var posts = res.data;
        if (posts.length === 0) {
          postsWall.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--text-dim);">კედელი ცარიელია. დაწერე პირველი პოსტი!</div>';
          return;
        }

        supabase.from('profiles').select('id, avatar_url').then(function(profilesRes) {
          cachedProfiles = {};
          if (profilesRes.data) {
            profilesRes.data.forEach(function(p) {
              cachedProfiles[p.id] = p.avatar_url;
            });
          }

          posts.forEach(function(post) {
            postsWall.innerHTML += createPostCardHtml(post);
          });

          observeVideos();
        });
      });
    }

    function buildCollageHtml(urlsString) {
      if (!urlsString) return "";
      
      var urls = [];
      if (urlsString.includes(",")) {
        urls = urlsString.split(",");
      } else {
        urls = [urlsString];
      }

      if (urls.length === 1) {
        var url = urls[0];
        if (url.includes('.mp4') || url.includes('video')) {
          return '<video class="post-media" src="' + url + '" controls></video>';
        } else {
          return '<img class="post-media" src="' + url + '" alt="Media">';
        }
      }

      var total = urls.length;
      var showLimit = Math.min(total, 6);
      var gridClass = "collage-" + showLimit;

      var html = '<div class="collage-container"><div class="collage-grid ' + gridClass + '">';
      for (var i = 0; i < showLimit; i++) {
        var url = urls[i];
        var isVideo = url.includes('.mp4') || url.includes('video');
        var isLastCell = (i === showLimit - 1);
        var moreCount = total - showLimit;

        if (isLastCell && moreCount > 0) {
          html += '<div class="collage-overlay">';
          if (isVideo) {
            html += '<video class="collage-item" src="' + url + '" controls></video>';
          } else {
            html += '<img class="collage-item" src="' + url + '">';
          }
          html += '<div class="collage-overlay-text">+' + (moreCount + 1) + '</div>';
          html += '</div>';
        } else {
          if (isVideo) {
            html += '<video class="collage-item" src="' + url + '" controls></video>';
          } else {
            html += '<img class="collage-item" src="' + url + '">';
          }
        }
      }
      html += '</div></div>';
      return html;
    }

    function createPostCardHtml(post) {
      var date = new Date(post.created_at).toLocaleDateString("ka-GE", { hour: '2-digit', minute: '2-digit' });
      var initial = post.author_name ? post.author_name.charAt(0).toUpperCase() : "?";
      
      var myName = userProfile ? userProfile.full_name : (currentUser ? currentUser.email : "?");
      var myAvatarUrl = userProfile ? userProfile.avatar_url : null;
      var myInitial = myName.charAt(0).toUpperCase();

      var authorAvatarUrl = cachedProfiles[post.user_id] || null;
      
      var avatarContent = authorAvatarUrl ? `<img src="${authorAvatarUrl}" alt="Avatar" style="width:100%; height:100%; object-fit:cover;">` : initial;
      var myCommentAvatar = myAvatarUrl ? `<img src="${myAvatarUrl}" alt="Avatar" style="width:100%; height:100%; object-fit:cover;">` : myInitial;

      var mediaHtml = buildCollageHtml(post.media_url);

      return `
        <div class="premium-card post-card">
          <div class="post-header">
            <div class="post-avatar" onclick="viewUserProfile('${post.user_id}')">${avatarContent}</div>
            <div class="post-author-info">
              <span class="post-author" onclick="viewUserProfile('${post.user_id}')">${post.author_name}</span>
              <span class="post-time">${date}</span>
            </div>
          </div>
          <div class="post-content">${post.content || ""}</div>
          
          ${mediaHtml}
          
          <div class="post-stats">
            <span>👍 ${post.likes_count || 0} ლაიქი</span>
            <span>0 კომენტარი</span>
          </div>
          <div class="post-actions">
            <button class="action-btn" onclick="likePost('${post.id}', ${post.likes_count})">👍 მოწონება</button>
            <button class="action-btn" onclick="focusCommentBox('${post.id}')">💬 კომენტარი</button>
          </div>

          <div class="comment-box-area">
            <div class="comment-box-avatar" onclick="viewUserProfile('${currentUser.id}')">${myCommentAvatar}</div>
            <div class="comment-input-container">
              <input type="text" id="comment-field-${post.id}" placeholder="დაწერე კომენტარი..." onkeypress="handleCommentKeyPress(event, '${post.id}')">
              <button class="comment-submit-button" onclick="submitComment('${post.id}')">გაგზავნა</button>
            </div>
          </div>
        </div>
      `;
    }

    function focusCommentBox(postId) {
      var field = document.getElementById('comment-field-' + postId);
      if (field) field.focus();
    }

    function handleCommentKeyPress(event, postId) {
      if (event.key === 'Enter') {
        submitComment(postId);
      }
    }

    function submitComment(postId) {
      var field = document.getElementById('comment-field-' + postId);
      var text = field.value.trim();
      if (!text) return;

      alert("კომენტარი შენახულია! ტექსტი: " + text);
      field.value = "";
    }

    function createPost() {
      var text = document.getElementById('post-text-input').value.trim();
      var fileInput = document.getElementById('post-media-file');
      var publishBtn = document.getElementById('publish-submit-btn');

      if (!text && fileInput.files.length === 0) {
        alert("შეავსეთ პოსტის ტექსტი ან აირჩიეთ ფაილი!");
        return;
      }

      publishBtn.disabled = true;
      publishBtn.innerText = "იტვირთება...";

      var authorName = userProfile ? userProfile.full_name : currentUser.email;

      if (fileInput.files.length > 0) {
        var files = Array.from(fileInput.files).slice(0, 6);
        var uploadedUrls = [];
        var promises = [];

        files.forEach(function(file, index) {
          var fileExt = file.name.split('.').pop();
          var fileName = currentUser.id + "_" + Date.now() + "_" + index + "." + fileExt;
          
          var promise = supabase.storage.from('post-media').upload(fileName, file).then(function(storageRes) {
            if (storageRes.error) {
              throw storageRes.error;
            }
            var mediaUrl = SUPABASE_URL + "/storage/v1/object/public/post-media/" + fileName;
            uploadedUrls.push(mediaUrl);
          });
          promises.push(promise);
        });

        Promise.all(promises).then(function() {
          var mediaUrlsJoined = uploadedUrls.join(",");
          var mediaType = files[0].type.startsWith('video') ? "video" : "image";
          savePostToDatabase(authorName, text, mediaUrlsJoined, mediaType, publishBtn);
        }).catch(function(err) {
          alert("ფაილის ატვირთვის შეცდომა: " + err.message);
          publishBtn.disabled = false;
          publishBtn.innerText = "გამოქვეყნება";
        });
      } else {
        savePostToDatabase(authorName, text, null, null, publishBtn);
      }
    }

    function savePostToDatabase(authorName, text, mediaUrl, mediaType, publishBtn) {
      supabase.from('posts').insert([
        {
          user_id: currentUser.id,
          author_name: authorName,
          content: text,
          media_url: mediaUrl,
          media_type: mediaType
        }
      ]).then(function(res) {
        publishBtn.disabled = false;
        publishBtn.innerText = "გამოქვეყნება";
        
        if (res.error) {
          alert("პოსტის შენახვის შეცდომა: " + res.error.message);
        } else {
          document.getElementById('post-text-input').value = "";
          document.getElementById('post-media-file').value = "";
          document.getElementById('selected-file-name').style.display = "none";
          loadPosts();
        }
      });
    }

    function likePost(postId, currentLikes) {
      supabase.from('posts')
        .update({ likes_count: currentLikes + 1 })
        .eq('id', postId)
        .then(function() {
          loadPosts();
        });
    }

    function logout() {
      supabase.auth.signOut().then(function() {
        alert("გახვედით სისტემიდან!");
        location.reload();
      });
    }
  </script>
</body>
</html>
