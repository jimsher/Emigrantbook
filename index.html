<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Clone</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* CSS სტილები */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fafafa; margin: 0; }
        .navbar { display: flex; justify-content: space-between; padding: 10px 20px; background: white; border-bottom: 1px solid #dbdbdb; position: sticky; top: 0; z-index: 10; }
        .logo { font-family: cursive; font-size: 24px; font-weight: bold; }
        .container { max-width: 935px; margin: 20px auto; }
        .post { background: white; border: 1px solid #dbdbdb; margin-bottom: 20px; border-radius: 8px; }
        .post-header { display: flex; align-items: center; padding: 15px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; margin-right: 10px; }
        .post-media img { width: 100%; display: block; }
        .post-actions { padding: 10px; }
        .profile-container { text-align: center; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; }
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 20px; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">Instagram</div>
        <div class="nav-links">
            <button onclick="showSection('feed')">Home</button>
            <button onclick="showSection('profile')">Profile</button>
        </div>
    </nav>

    <main class="container">
        <section id="feed" class="feed-container">
            <article class="post">
                <header class="post-header">
                    <img src="avatar.jpg" class="avatar" id="user-avatar">
                    <span class="username">username</span>
                </header>
                <div class="post-media">
                    <img src="post-image.jpg" alt="Post content">
                </div>
                <div class="post-actions">
                    <button>Like</button>
                    <button>Comment</button>
                    <button>Share</button>
                </div>
            </article>
        </section>

        <section id="profile" class="profile-container" style="display:none;">
            <div class="profile-header">
                <img src="avatar.jpg" class="profile-avatar">
                <div class="profile-stats">
                    <p>10 Posts | 100 Followers</p>
                </div>
            </div>
            <div class="profile-grid"></div>
        </section>
    </main>

    <script>
    // Supabase კონფიგურაცია
    const SUPABASE_URL = 'https://mohkxmwphwywkqkoairj.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_YSbnMz9ZTafeFUCVp7vR7g_-cnNVKzx';

    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ტესტი: შევამოწმოთ კავშირი კონსოლში
    async function checkConnection() {
        try {
            const { data, error } = await supabase.from('profiles').select('*').limit(1);
            if (error) throw error;
            console.log("წარმატება! კავშირი დამყარებულია:", data);
        } catch (err) {
            console.error("შეცდომა კავშირის დროს:", err.message);
        }
    }

    checkConnection();

    // ნავიგაციის ფუნქცია
    function showSection(id) {
        document.getElementById('feed').style.display = (id === 'feed') ? 'block' : 'none';
        document.getElementById('profile').style.display = (id === 'profile') ? 'block' : 'none';
    }


       /**
 * პოსტების წამოღება Supabase-დან
 */
async function loadFeed() {
    const { data: posts, error } = await supabase
        .from('posts')
        .select(`
            id,
            image_url,
            caption,
            profiles (username, avatar_url)
        `)
        .order('created_at', { ascending: false });

    if (error) {
        console.error("პოსტების ჩატვირთვის შეცდომა:", error);
        return;
    }

    const feedContainer = document.getElementById('feed');
    feedContainer.innerHTML = ''; // გასუფთავება

    posts.forEach(post => {
        const postElement = `
            <article class="post">
                <header class="post-header">
                    <img src="${post.profiles.avatar_url || 'default-avatar.png'}" class="avatar">
                    <span class="username">${post.profiles.username}</span>
                </header>
                <div class="post-media">
                    <img src="${post.image_url}" alt="Post content">
                </div>
                <div class="post-actions">
                    <p><strong>${post.profiles.username}</strong> ${post.caption || ''}</p>
                    <button>Like</button>
                    <button>Comment</button>
                </div>
            </article>
        `;
        feedContainer.innerHTML += postElement;
    });
}

// გვერდის ჩატვირთვისას ავტომატურად გავუშვათ
loadFeed(); 
</script>
</body>
</html>
