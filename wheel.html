<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Emigrantbook - Live გათამაშება</title>
  
  <!-- Firebase App & Services CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      touch-action: manipulation;
    }

    body, html {
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, #1a1a1f 0%, #08080a 100%);
      color: #ffffff;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }

    /* Top Navigation Header */
    .header-bar {
      width: 100%;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(18, 18, 20, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(220, 174, 54, 0.2);
      z-index: 100;
    }

    .back-btn {
      background: rgba(220, 174, 54, 0.15);
      border: 1px solid #dcae36;
      color: #dcae36;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.3s ease;
    }

    .back-btn:hover {
      background: #dcae36;
      color: #111;
      box-shadow: 0 0 15px rgba(220, 174, 54, 0.5);
    }

    .live-badge {
      background: #ff4d4f;
      color: white;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 0 12px rgba(255, 77, 79, 0.6);
      animation: pulseLive 1.5s infinite;
    }

    @keyframes pulseLive {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(1.05); }
      100% { opacity: 1; transform: scale(1); }
    }

    .header-title {
      font-size: 18px;
      font-weight: 800;
      color: #dcae36;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      text-shadow: 0 0 10px rgba(220, 174, 54, 0.3);
    }

    /* Wheel Container Area */
    .wheel-main-stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      width: 100%;
      max-width: 550px;
    }

    /* Glowing Outer Ring */
    .wheel-outer-glow {
      position: relative;
      width: 90vw;
      height: 90vw;
      max-width: 440px;
      max-height: 440px;
      border-radius: 50%;
      padding: 10px;
      background: radial-gradient(circle, #2a2518 0%, #111 100%);
      border: 4px solid #dcae36;
      box-shadow: 0 0 40px rgba(220, 174, 54, 0.45), inset 0 0 20px rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* HD Arrow Pointer - 12 საათის პოზიციაზე, დაბლა მიმართული */
    .wheel-pointer {
      position: absolute;
      top: -22px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 20px solid transparent;
      border-right: 20px solid transparent;
      border-top: 40px solid #dcae36;
      z-index: 50;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.9));
    }

    .wheel-pointer::after {
      content: '';
      position: absolute;
      top: -38px;
      left: -13px;
      width: 0;
      height: 0;
      border-left: 13px solid transparent;
      border-right: 13px solid transparent;
      border-top: 26px solid #ff4d4f;
    }

    /* Canvas Wheel (HD Display) */
    #wheelCanvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
    }

    /* Wheel Center Cap */
    .wheel-center-cap {
      position: absolute;
      width: 75px;
      height: 75px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffd700 0%, #b8860b 100%);
      border: 3px solid #ffffff;
      box-shadow: 0 0 25px rgba(220, 174, 54, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }

    .wheel-center-cap img {
      width: 48px;
      height: 48px;
      object-fit: contain;
    }

    /* Controls Bar */
    .control-panel {
      width: 100%;
      padding: 20px;
      background: rgba(18, 18, 20, 0.9);
      border-top: 1px solid rgba(220, 174, 54, 0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      z-index: 100;
    }

    .status-info-box {
      font-size: 15px;
      color: #dcae36;
      font-weight: bold;
      text-align: center;
      background: rgba(220, 174, 54, 0.1);
      border: 1px solid rgba(220, 174, 54, 0.3);
      padding: 12px 20px;
      border-radius: 12px;
      width: 100%;
      max-width: 380px;
    }

    .active-users-counter {
      font-size: 13px;
      color: #aaaaaa;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .active-users-counter strong {
      color: #dcae36;
    }

    /* Winner Modal Pop-up */
    .winner-modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.88);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(8px);
    }

    .winner-modal-card {
      background: #18181c;
      border: 2px solid #dcae36;
      border-radius: 20px;
      padding: 30px 20px;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 0 40px rgba(220, 174, 54, 0.5);
      position: relative;
      animation: modalPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes modalPop {
      0% { opacity: 0; transform: scale(0.5); }
      100% { opacity: 1; transform: scale(1); }
    }

    .winner-avatar-frame {
      width: 110px;
      height: 110px;
      margin: 0 auto 15px auto;
      border-radius: 50%;
      border: 4px solid #dcae36;
      box-shadow: 0 0 25px rgba(220, 174, 54, 0.6);
      overflow: hidden;
      background: #222;
    }

    .winner-avatar-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .winner-title {
      color: #dcae36;
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 5px;
    }

    .winner-name {
      font-size: 20px;
      font-weight: bold;
      color: #ffffff;
      margin-bottom: 15px;
    }

    .winner-prize-tag {
      background: rgba(220, 174, 54, 0.2);
      border: 1px solid #dcae36;
      color: #ffd700;
      padding: 8px 16px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 20px;
      display: inline-block;
    }

    .close-modal-btn {
      background: #dcae36;
      color: #111;
      border: none;
      padding: 12px 30px;
      border-radius: 10px;
      font-weight: bold;
      font-size: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <div class="header-bar">
    <button class="back-btn" onclick="window.location.href='index.html'">
      ← უკან
    </button>
    <div class="header-title">Emigrant Wheel</div>
    <div class="live-badge">
      <span>🔴</span> LIVE
    </div>
  </div>

  <!-- Main Stage -->
  <div class="wheel-main-stage">
    <div class="wheel-pointer"></div>
    <div class="wheel-outer-glow">
      <!-- 1200x1200px HD resolution for crisp vector drawing -->
      <canvas id="wheelCanvas" width="1200" height="1200"></canvas>
      <div class="wheel-center-cap">
        <img src="logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/50?text=EB'">
      </div>
    </div>
  </div>

  <!-- Control Panel -->
  <div class="control-panel">
    <div class="status-info-box" id="statusBox">
      🔍 ველოდებით მონაწილეებს...
    </div>
    <div class="active-users-counter">
      👥 ბორბალზე მონაწილეობს: <strong id="participants-count">0/4</strong> აქტიური წევრი
    </div>
  </div>

  <!-- Winner Modal -->
  <div class="winner-modal-overlay" id="winnerModal">
    <div class="winner-modal-card">
      <div class="winner-avatar-frame" id="winnerAvatarHolder"></div>
      <div class="winner-title" id="winnerModalTitle">🎉 გილოცავთ! 🎉</div>
      <div class="winner-name" id="winnerNameDisplay">მომხმარებელი</div>
      <div class="winner-prize-tag" id="winnerPrizeTag">🎁 მოიგო: 50 akho ბალანსი</div>
      <button class="close-modal-btn" onclick="closeWinnerModal()">დახურვა</button>
    </div>
  </div>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyA6FGTJch13HCEGXeKEGDxGMEcqg3GPeb4",
      authDomain: "emigrantbook-4b7bd.firebaseapp.com",
      projectId: "emigrantbook-4b7bd",
      storageBucket: "emigrantbook-4b7bd.firebasestorage.app",
      messagingSenderId: "109907338554",
      appId: "1:109907338554:web:fde6c296d9ff56f6305c03"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const db = firebase.firestore();
    const auth = firebase.auth();

    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const statusBox = document.getElementById('statusBox');
    
    let participants = [];
    let loadedImages = {};
    let currentAngle = 0;
    let isSpinning = false;
    let idleRotationSpeed = 0.003;
    let animationReq = null;
    let timerInterval = null;

    const sliceColors = ['#1e1e24', '#2a2415', '#141418', '#382e14', '#1b1b22', '#221d10'];
    const TRY_AGAIN_COLOR = '#b92c2c';

    // ავტორიზებული მომხმარებლის ავტომატური რეგისტრაცია გათამაშებაში
    auth.onAuthStateChanged(user => {
      if (user) {
        registerUserToLottery(user);
      }
    });

    
    function registerUserToLottery(user) {
  if (!user) {
    console.error("მომხმარებელი ავტორიზებული არ არის!");
    return;
  }

  // 1. ამოვიღოთ მომხმარებლის მონაცემები პროფილიდან
  db.collection('profiles').doc(user.uid).get().then(function(docSnap) {
    var userName = user.email;
    var userAvatar = null;

    if (docSnap.exists) {
      var pData = docSnap.data();
      userName = pData.full_name || user.email;
      userAvatar = pData.avatar_url || null;
    }

    // 2. ჩავწეროთ გათამაშების მონაწილეთა კოლექციაში
    var addParticipant = db.collection('lottery_participants').doc(user.uid).set({
      user_id: user.uid,
      full_name: userName,
      avatar_url: userAvatar,
      joined_at: firebase.firestore.FieldValue.serverTimestamp(),
      status: 'active'
    }, { merge: true });

    // 3. 🚀 განვაახლოთ lottery_state/current, რომ მთავარ გვერდზე Live Post გამოჩნდეს!
    var updateLiveState = db.collection('lottery_state').doc('current').set({
      status: 'active',
      last_updated: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });

    return Promise.all([addParticipant, updateLiveState]);
  })
  .then(function() {
    console.log("✅ მომხმარებელი დაემატა და მთავარ გვერდზე Live Post ჩაირთო!");
  })
  .catch(function(error) {
    console.error("❌ შეცდომა გათამაშებაში დამატებისას:", error);
  });
}

    // 1. Realtime სინქრონიზაცია ბაზასთან (ორმაგი შემოწმებით)
    function subscribeToLiveLottery() {
      // ა) Realtime მოსმენა lottery_participants კოლექციიდან
      db.collection('lottery_participants').limit(4).onSnapshot(async snapshot => {
        let rawUsers = [];
        snapshot.forEach(doc => {
          rawUsers.push({ id: doc.id, ...doc.data() });
        });

        if (rawUsers.length > 0) {
          updateWheelParticipants(rawUsers);
        }
      });

      // ბ) Realtime მოსმენა lottery_state კოლექციიდან
      db.collection('lottery_state').doc('current').onSnapshot(async docSnap => {
        if (!docSnap.exists) return;

        let data = docSnap.data();
        let rawUsers = data.participants || [];

        if (rawUsers.length > 0) {
          updateWheelParticipants(rawUsers);
        }

        if (data.status === 'waiting') {
          start10MinTimer(data.timer_start);
        } else if (data.status === 'spinning' && !isSpinning) {
          if (timerInterval) clearInterval(timerInterval);
          statusBox.innerText = "⚡ გათამაშება მიმდინარეობს (1 წთ)...";
          trigger1MinuteSpin(data.winning_index);
        } else if (data.status === 'finished') {
          if (timerInterval) clearInterval(timerInterval);
          statusBox.innerText = "🏆 გათამაშება დასრულდა!";
        }
      });
    }

    async function updateWheelParticipants(rawUsers) {
      let processedUsers = await Promise.all(rawUsers.slice(0, 4).map(async (u) => {
        let userId = u.uid || u.id;
        let name = u.name || u.full_name;
        let avatar = u.avatar || u.avatar_url;

        if ((!name || !avatar) && userId) {
          try {
            let pDoc = await db.collection('profiles').doc(userId).get();
            if (pDoc.exists) {
              let pData = pDoc.data();
              if (!name) name = pData.full_name || pData.name || "მომხმარებელი";
              if (!avatar) avatar = pData.avatar_url || pData.photo;
            }
          } catch(e) {
            console.log("Profile fetch error:", e);
          }
        }

        return {
          id: userId,
          name: name || "მომხმარებელი",
          avatar: avatar || null,
          isTryAgain: false
        };
      }));

      participants = processedUsers;

      // ყოველთვის ვამატებთ "კიდევ სცადეთ" სექტორს
      participants.push({
        id: 'try_again',
        name: 'კიდევ სცადეთ ❌',
        avatar: null,
        isTryAgain: true
      });

      document.getElementById('participants-count').innerText = `${rawUsers.length}/4`;
      preloadAvatars();
    }

    function start10MinTimer(startTimestamp) {
      if (!startTimestamp) {
        statusBox.innerText = `🔍 შეგროვებულია ${participants.length - 1}/4 მონაწილე...`;
        return;
      }
      if (timerInterval) clearInterval(timerInterval);

      const startTime = startTimestamp.toDate ? startTimestamp.toDate().getTime() : new Date(startTimestamp).getTime();
      const tenMinutes = 10 * 60 * 1000;

      timerInterval = setInterval(() => {
        const now = new Date().getTime();
        const remaining = tenMinutes - (now - startTime);

        if (remaining <= 0) {
          clearInterval(timerInterval);
          statusBox.innerText = "⏰ 10 წუთი ამოიწურა! იწყება გათამაშება...";
        } else {
          const mins = Math.floor(remaining / (1000 * 60));
          const secs = Math.floor((remaining % (1000 * 60)) / 1000);
          statusBox.innerText = `⏳ იწყება: ${mins}:${secs < 10 ? '0' : ''}${secs} (${participants.length - 1}/4 წევრი)`;
        }
      }, 1000);
    }

    function preloadAvatars() {
      participants.forEach((p) => {
        if (p.avatar && !loadedImages[p.id]) {
          let img = new Image();
          img.crossOrigin = "anonymous";
          img.src = p.avatar;
          img.onload = () => { loadedImages[p.id] = img; drawWheel(); };
          img.onerror = () => { loadedImages[p.id] = null; drawWheel(); };
        }
      });
      drawWheel();
      if (!isSpinning) startIdleRotation();
    }

    // HD 1200x1200px Canvas-ის დახატვა
    function drawWheel() {
      const numSlices = participants.length;
      if (numSlices === 0) return;

      const sliceAngle = (2 * Math.PI) / numSlices;
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      const radius = canvas.width / 2 - 20;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < numSlices; i++) {
        const startAngle = currentAngle + i * sliceAngle;
        const endAngle = startAngle + sliceAngle;
        const p = participants[i];

        // სექტორის ფონი
        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, startAngle, endAngle);
        ctx.closePath();
        
        ctx.fillStyle = p.isTryAgain ? TRY_AGAIN_COLOR : sliceColors[i % sliceColors.length];
        ctx.fill();
        ctx.strokeStyle = '#dcae36';
        ctx.lineWidth = 5;
        ctx.stroke();

        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(startAngle + sliceAngle / 2);

        // HD ავატარი / ემოჯი
        const avatarSize = 85;
        const avatarDist = radius * 0.68;

        if (p.isTryAgain) {
          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 50px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('❌', avatarDist, 0);
        } else {
          // ავატარის ოქროსფერი რგოლი (HD Border)
          ctx.beginPath();
          ctx.arc(avatarDist, 0, avatarSize / 2 + 3, 0, Math.PI * 2);
          ctx.fillStyle = '#dcae36';
          ctx.fill();

          ctx.beginPath();
          ctx.arc(avatarDist, 0, avatarSize / 2, 0, Math.PI * 2);
          ctx.closePath();
          ctx.clip();

          const img = loadedImages[p.id];
          if (img) {
            ctx.drawImage(img, avatarDist - avatarSize / 2, -avatarSize / 2, avatarSize, avatarSize);
          } else {
            ctx.fillStyle = '#1c1c1e';
            ctx.fillRect(avatarDist - avatarSize / 2, -avatarSize / 2, avatarSize, avatarSize);
            ctx.fillStyle = '#dcae36';
            ctx.font = 'bold 36px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(p.name.charAt(0).toUpperCase(), avatarDist, 2);
          }
        }
        ctx.restore();

        // HD მსხვილი სახელი
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(startAngle + sliceAngle / 2);
        
        ctx.fillStyle = '#ffffff';
        ctx.shadowColor = 'rgba(0, 0, 0, 0.9)';
        ctx.shadowBlur = 8;
        ctx.font = 'bold 26px -apple-system, BlinkMacSystemFont, sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(p.name, radius * 0.45, 8);
        ctx.restore();
      }
    }

    function startIdleRotation() {
      if (isSpinning) return;
      currentAngle += idleRotationSpeed;
      drawWheel();
      animationReq = requestAnimationFrame(startIdleRotation);
    }

    // 60-წამიანი ჩქარი ტრიალი
    function trigger1MinuteSpin(winningIndex) {
      if (isSpinning || participants.length === 0) return;
      
      isSpinning = true;
      cancelAnimationFrame(animationReq);

      const targetIdx = (winningIndex !== undefined && winningIndex < participants.length) 
        ? winningIndex 
        : Math.floor(Math.random() * participants.length);

      const sliceAngle = (2 * Math.PI) / participants.length;
      const extraRounds = 45;
      const targetSliceOffset = (1.5 * Math.PI) - (targetIdx * sliceAngle + sliceAngle / 2);
      const targetAngle = currentAngle + (extraRounds * 2 * Math.PI) + targetSliceOffset;

      let start = null;
      const duration = 60000; // ზუსტად 1 წუთი

      function easeOutQuad(t) {
        return t * (2 - t);
      }

      function animateSpin(timestamp) {
        if (!start) start = timestamp;
        let progress = (timestamp - start) / duration;

        if (progress < 1) {
          let easeProgress = easeOutQuad(progress);
          currentAngle = currentAngle + (targetAngle - currentAngle) * (easeProgress * 0.015);
          drawWheel();
          requestAnimationFrame(animateSpin);
        } else {
          currentAngle = targetAngle;
          drawWheel();
          announceWinner(participants[targetIdx]);
        }
      }

      requestAnimationFrame(animateSpin);
    }

    function announceWinner(winner) {
      const modal = document.getElementById('winnerModal');
      const titleHolder = document.getElementById('winnerModalTitle');
      const nameHolder = document.getElementById('winnerNameDisplay');
      const avatarHolder = document.getElementById('winnerAvatarHolder');
      const prizeTag = document.getElementById('winnerPrizeTag');

      if (winner.isTryAgain) {
        titleHolder.innerText = "❌ ვერ გამოვლინდა";
        nameHolder.innerText = "ისარი გაჩერდა: კიდევ სცადეთ!";
        avatarHolder.innerHTML = `<div style="width:100%; height:100%; background:#c0392b; color:#fff; font-size:50px; display:flex; align-items:center; justify-content:center;">❌</div>`;
        prizeTag.innerText = "🎁 პრიზი 50 akho ინახება!";
        statusBox.innerText = "❌ ამჯერად გამარჯვებული ვერ გამოვლინდა";
      } else {
        titleHolder.innerText = "🎉 გილოცავთ! 🎉";
        nameHolder.innerText = winner.name;
        
        if (winner.avatar) {
          avatarHolder.innerHTML = `<img src="${winner.avatar}" alt="Winner">`;
        } else {
          avatarHolder.innerHTML = `<div style="width:100%; height:100%; background:#dcae36; color:#111; font-size:40px; font-weight:bold; display:flex; align-items:center; justify-content:center;">${winner.name.charAt(0).toUpperCase()}</div>`;
        }

        prizeTag.innerText = "🎁 მოიგო: 50 akho ბალანსი";
        statusBox.innerText = "🎉 გამარჯვებული გამოვლენილია!";
      }

      modal.style.display = 'flex';
    }

    function closeWinnerModal() {
      document.getElementById('winnerModal').style.display = 'none';
      isSpinning = false;
      statusBox.innerText = "🔍 ველოდებით ახალ გათამაშებას...";
      startIdleRotation();
    }

    // ჩართვა
    subscribeToLiveLottery();
  </script>
</body>
</html>
